# SPDX-License-Identifier: Apache-2.0
# Keycloak (dev) for the IDENTITY local e2e. start-dev (H2, no separate DB) + declarative realm import.
# KC_HOSTNAME pins the issuer host to keycloak.localtest.me:8080 so the BROWSER-minted token `iss`
# matches what the in-cluster API validates against (a CoreDNS rewrite points that host at this Service).
# The realm-norviq ConfigMap (realm-norviq.json) is created by 00-up.sh from the file in this dir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: norviq
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args: ["start-dev", "--import-realm"]
          env:
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: admin }
            - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: admin }
            - { name: KC_HOSTNAME, value: "http://keycloak.localtest.me:8080" }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HTTP_ENABLED, value: "true" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /realms/norviq, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 40
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: norviq
  labels:
    app: keycloak
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
