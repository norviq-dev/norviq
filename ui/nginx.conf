# SPDX-License-Identifier: Apache-2.0
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed: cache forever. A missing chunk (old hash after a
    # redeploy) MUST 404 — falling through to index.html would serve HTML as JS to a stale tab,
    # killing the app while the last-painted UI stays frozen.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The SPA shell must always revalidate: a cached index.html references deleted chunks
    # (see /assets/ above). no-cache = store but revalidate via ETag on every load.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://norviq-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Single-cluster-first: the /fleet-api proxy is written by the entrypoint ONLY when FLEET_API_URL is set (the
    # hub). A single-cluster/spoke install leaves it empty -> this include is empty -> nginx never references the
    # (non-existent) norviq-fleet-api upstream, so the default image starts cleanly with no fleet dependency.
    include /etc/nginx/fleet-proxy.conf;

    # WebSocket (Audit Log live updates). Without the upgrade headers the browser's
    # ws(s)://{ui-origin}/ws/audit connection fails in prod (it only worked via the dev proxy).
    location /ws/ {
        proxy_pass http://norviq-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://norviq-api:8080;
    }

    location /readyz {
        proxy_pass http://norviq-api:8080;
    }
}
