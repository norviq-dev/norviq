server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://norviq-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (Audit Log live updates). Without the upgrade headers the browser's
    # ws(s)://{ui-origin}/ws/audit connection fails in prod (it only worked via the dev proxy).
    location /ws/ {
        proxy_pass http://norviq-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://norviq-api:8080;
    }

    location /readyz {
        proxy_pass http://norviq-api:8080;
    }
}
