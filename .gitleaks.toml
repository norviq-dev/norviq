# Gitleaks config — extends the default rules, adds a scoped allowlist.
# Scans are run over the DIFF / PR-range (see .github/workflows/security.yml + .pre-commit-config.yaml),
# NOT full git history — history contains a rotated JWT + past secrets we deliberately do not re-alarm on.
[extend]
useDefault = true

[allowlist]
description = "Norviq allowlist — test fixtures, attack payloads, and example placeholders are not real secrets."
paths = [
  '''tests/.*''',
  '''norviq/redteam/.*''',
  '''norviq/sdk/attacks/.*''',
  '''.*\.md$''',                 # docs/specs use example tokens
  '''specs/prompts/.*''',
]
# Common non-secret placeholders used in dev/kind (e.g. norviq-redis-password).
regexes = [
  '''norviq-[a-z-]+-password''',
  '''change-?me''',
  '''example\.com''',
]
