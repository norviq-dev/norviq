# Checkov config for helm/ IaC scanning.
# soft-fail during rollout (report-only); flip to false after baseline triage
# (docs/engineering/security-baseline.md), then the iac job in security.yml ratchets to blocking.
soft-fail: true
directory:
  - helm
skip-path:
  - ui/node_modules
  - tests
framework:
  - helm
  - kubernetes
  - dockerfile
compact: true
