apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nrvqclasses.norviq.io
  labels:
    app.kubernetes.io/name: norviq
spec:
  group: norviq.io
  names:
    kind: NrvqClass
    listKind: NrvqClassList
    plural: nrvqclasses
    singular: nrvqclass
    shortNames:
      - nc
      - nrvqc
    categories:
      - norviq
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - description
                - allowedTools
              properties:
                description:
                  type: string
                  maxLength: 256
                allowedTools:
                  type: array
                  maxItems: 256
                  items:
                    type: string
                    maxLength: 128
                    pattern: ^[a-zA-Z0-9_.\/-]+$
                blockedTools:
                  type: array
                  maxItems: 256
                  items:
                    type: string
                    maxLength: 128
                    pattern: ^[a-zA-Z0-9_.\/-]+$
                maxCallsPerMinute:
                  type: integer
                  default: 60
                  minimum: 1
                  maximum: 10000
                initialTrustScore:
                  type: number
                  default: 0.8
                  minimum: 0
                  maximum: 1.0
                trustThreshold:
                  type: number
                  default: 0.4
                  minimum: 0
                  maximum: 1.0
                labelSelector:
                  type: string
                  maxLength: 256
                  default: norviq.io/agent-class
            status:
              type: object
              properties:
                agentCount:
                  type: integer
                averageTrustScore:
                  type: number
                policyCount:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agents
          type: integer
          jsonPath: .status.agentCount
        - name: Avg-Trust
          type: number
          jsonPath: .status.averageTrustScore
        - name: Policies
          type: integer
          jsonPath: .status.policyCount
        - name: Rate-Limit
          type: integer
          jsonPath: .spec.maxCallsPerMinute
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
