apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nrvqconfigs.norviq.io
  labels:
    app.kubernetes.io/name: norviq
spec:
  group: norviq.io
  names:
    kind: NrvqConfig
    listKind: NrvqConfigList
    plural: nrvqconfigs
    singular: nrvqconfig
    shortNames:
      - nconf
    categories:
      - norviq
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                global:
                  type: object
                  properties:
                    enforcementMode:
                      type: string
                      enum: ["block", "audit"]
                      default: block
                      description: Global enforcement mode. Use audit for shadow mode.
                    logLevel:
                      type: string
                      enum: ["DEBUG", "INFO", "WARNING", "ERROR"]
                      default: INFO
                trust:
                  type: object
                  properties:
                    defaultScore:
                      type: number
                      default: 0.8
                      minimum: 0
                      maximum: 1.0
                    threshold:
                      type: number
                      default: 0.4
                      minimum: 0
                      maximum: 1.0
                    violationPenalty:
                      type: number
                      default: 0.05
                      minimum: 0
                      maximum: 1.0
                    decayHours:
                      type: integer
                      default: 24
                      minimum: 0
                      maximum: 720
                rateLimit:
                  type: object
                  properties:
                    defaultMaxPerMinute:
                      type: integer
                      default: 60
                      minimum: 1
                      maximum: 100000
                    burstThreshold:
                      type: integer
                      default: 20
                      minimum: 1
                      maximum: 100000
                sidecar:
                  type: object
                  properties:
                    image:
                      type: string
                      default: norviq/norviq-engine:engine-latest
                      maxLength: 256
                      pattern: ^(norviq/norviq-engine|docker\.io/norviq/norviq-engine):[a-zA-Z0-9._-]+$
                      description: Sidecar image restricted to official Norviq images
                    port:
                      type: integer
                      default: 8282
                      minimum: 1
                      maximum: 65535
                    resources:
                      type: object
                      properties:
                        cpuRequest:
                          type: string
                          default: 50m
                          maxLength: 32
                          pattern: ^([0-9]+m|[0-9]+(\.[0-9]+)?)$
                        memoryRequest:
                          type: string
                          default: 64Mi
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti|Pi|Ei)$
                        cpuLimit:
                          type: string
                          default: 200m
                          maxLength: 32
                          pattern: ^([0-9]+m|[0-9]+(\.[0-9]+)?)$
                        memoryLimit:
                          type: string
                          default: 128Mi
                          maxLength: 32
                          pattern: ^[0-9]+(Ki|Mi|Gi|Ti|Pi|Ei)$
                telemetry:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    endpoint:
                      type: string
                      maxLength: 256
                      default: http://otel-collector:4317
            status:
              type: object
              properties:
                appliedAt:
                  type: string
                  format: date-time
                activeNamespaces:
                  type: integer
                totalPolicies:
                  type: integer
                totalAgents:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.global.enforcementMode
        - name: Trust-Threshold
          type: number
          jsonPath: .spec.trust.threshold
        - name: Rate-Limit
          type: integer
          jsonPath: .spec.rateLimit.defaultMaxPerMinute
        - name: Namespaces
          type: integer
          jsonPath: .status.activeNamespaces
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
