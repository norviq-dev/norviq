# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: norviq
description: Runtime security for LLM agent tool calls
type: application
version: 0.1.0
appVersion: "0.1.0"
# Minimum Kubernetes the chart is tested against. The `-0` suffix lets pre-release/distro-suffixed
# server versions (e.g. v1.30.1-eks-...) satisfy the constraint. helm install refuses on older.
kubeVersion: ">=1.30.0-0"
home: https://norviq.dev
icon: https://raw.githubusercontent.com/norviq-dev/norviq/main/.github/assets/norviq-mark.svg
sources:
  - https://github.com/norviq-dev/norviq
maintainers:
  - name: Norviq
    email: opensource@norviq.dev
keywords:
  - llm
  - security
  - kubernetes
  - opa
  - ai-safety
annotations:
  # Artifact Hub listing metadata (https://artifacthub.io/docs/topics/annotations/helm/).
  # Inert unless the repo is registered on Artifact Hub; safe to carry pre-launch.
  artifacthub.io/category: security
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Homepage
      url: https://norviq.dev
    - name: Source
      url: https://github.com/norviq-dev/norviq
    - name: Documentation
      url: https://github.com/norviq-dev/norviq/tree/main/docs
    - name: Security policy
      url: https://github.com/norviq-dev/norviq/blob/main/SECURITY.md
  artifacthub.io/operator: "false"
