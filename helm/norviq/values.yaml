# SPDX-License-Identifier: Apache-2.0
namespace: norviq
policyQuotaNamespaces:
  - default
  - chatbot-prod
  - analytics
validatingAdmissionPolicyEnabled: true
baselineClusterPolicy:
  enabled: true
  name: baseline-cluster-guard
  clusterPriority: 900
  preset: strict

images:
  # Optional registry prefix (with trailing slash) prepended to every component repository so
  # GHCR / ACR are drop-in: e.g. registry "ghcr.io/" + repository "norviq-dev/norviq-engine", or
  # "<acct>.azurecr.io/". Empty = Docker Hub (the default sanman97/norviq-engine, now public).
  registry: ""
  engine:
    repository: sanman97/norviq-engine
    tag: engine-latest
    pullPolicy: Always
  api:
    repository: sanman97/norviq-engine
    tag: api-latest
    pullPolicy: Always
  ui:
    repository: sanman97/norviq-engine
    tag: ui-latest
    pullPolicy: Always
  webhook:
    repository: sanman97/norviq-engine
    tag: webhook-latest
    pullPolicy: Always
  redis:
    repository: redis
    tag: "7-alpine"
  postgresql:
    repository: postgres
    tag: "16-alpine"

# Pull secrets for the component images. Default to the Docker Hub creds; set to [] when the images
# are public (the locked default) or override with the GHCR/ACR pull secret name.
imagePullSecrets:
  - name: dockerhub-secret

# Graceful shutdown: a preStop sleep lets the Service deregister the endpoint before SIGTERM so
# in-flight requests drain during a rolling upgrade. Applied to api/engine/webhook. 0 = no hook.
gracefulShutdown:
  preStopSleepSeconds: 3

engine:
  replicas: 1
  pdb:
    enabled: false     # multi-node prod: keep >=1 engine available during disruptions
    minAvailable: 1
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8282

api:
  replicas: 2          # HA default: survive a single pod restart/drain without an enforcement gap
  pdb:
    enabled: true      # keep >=1 API pod available during voluntary disruptions (node drain/upgrade)
    minAvailable: 1
  # HPA (multi-node prod): off by default (single node can't autoscale). Needs metrics-server.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  # Spread replicas across nodes (multi-node prod): podAntiAffinity + topologySpreadConstraints.
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8080
  secretKey: "change-me-in-production"
  env:
    - name: NRVQ_DB_SSL_MODE
      value: "require"
    - name: NRVQ_DB_POOL_MAX_OVERFLOW
      value: "10"
    - name: NRVQ_DB_POOL_TIMEOUT
      value: "10"
    - name: NRVQ_DB_COMMAND_TIMEOUT
      value: "10"

ui:
  replicas: 1
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  port: 80

webhook:
  enabled: true
  validating:
    enabled: false
  # Turnkey sidecar injection: render the MutatingWebhookConfiguration from the chart and
  # auto-bootstrap TLS via a pre/post-install hook Job (self-signs a cert, writes the
  # norviq-webhook-tls secret, patches the webhook caBundle). No cert-manager required.
  # Enable with --set webhook.injection.enabled=true, then label target namespaces:
  #   kubectl label ns <ns> norviq-injection=enabled
  injection:
    enabled: false
    # Image with kubectl + openssl for the cert-bootstrap hook Job. alpine/k8s ships both and is
    # publicly pullable (bitnami/kubectl tags were removed from Docker Hub in the 2025 Bitnami change).
    certJobImage: "alpine/k8s:1.30.0"
  replicas: 2
  pdb:
    enabled: false     # multi-node prod
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  port: 8443
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

redis:
  enabled: true
  replicas: 1
  # HA (multi-node prod, GATED, not live-validated on 1 node): when true, render a Redis HA topology
  # (Sentinel) instead of the single StatefulSet. Requires the operator/Sentinel chart pre-installed.
  ha:
    enabled: false
    replicas: 3
    serviceName: norviq-redis-ha
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  port: 6379
  password: "norviq-redis-password"
  storage: 1Gi

postgresql:
  enabled: true
  replicas: 1
  # HA (multi-node prod, GATED, not live-validated on 1 node): when true, render a CloudNativePG
  # `Cluster` (3 instances) instead of the single StatefulSet, and point the API's PG URL at its
  # service. Requires the CloudNativePG operator pre-installed in the cluster.
  ha:
    enabled: false
    instances: 3
    serviceName: norviq-postgresql-ha-rw
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 5432
  database: norviq
  username: norviq
  password: "norviq-pg-password"
  storage: 5Gi

otel:
  enabled: false
  endpoint: "http://otel-collector:4317"
  prometheusPort: 9090

# Long-lived OPA policy engine, run as a sidecar in the api and engine pods (localhost:8181).
# Each replica gets its own OPA -> no shared single point of failure. config.opaMode=server (default)
# queries it over HTTP; set config.opaMode=subprocess to roll back to the per-call `opa eval` fork.
opa:
  enabled: true
  image: "openpolicyagent/opa:latest-static"
  port: 8181
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: norviq.example.com
  tls: false

config:
  logLevel: INFO
  enforcementMode: block
  # OPA evaluation runtime: "server" (HTTP to the sidecar) or "subprocess" (per-call fork, rollback).
  opaMode: server
  # Refuse to start on the default JWT secret. Set true in production (and set api.secretKey).
  requireStrongSecret: false
  trustThreshold: 0.7
  violationPenalty: 0.05
  rateLimit: 60
  dbSslMode: require
  dbPoolMaxOverflow: 10
  dbPoolTimeout: 10
  dbCommandTimeout: 10
  # Workload-identity resolution: "mock" (env-var identity; default) or "workload-api" (real SPIFFE
  # SVID, fail-closed). workload-api requires SPIRE on the cluster (deferred B1) + pyspiffe installed.
  spiffeMode: mock

# OIDC / SSO (IDENTITY epic A1/A2). Default-off: the API keeps validating legacy HS256 tokens until
# an IdP is wired. Enabling adds RS256/ES256 validation ALONGSIDE HS256 (set legacyHs256Enabled:false
# at cutover). Map IdP groups -> Norviq (role, namespace) via groupMappings (GitOps).
oidc:
  enabled: false
  issuer: ""              # https://<tenant>/  (the token `iss`)
  audience: ""            # the API's client/audience id (the token `aud`)
  jwksUrl: ""             # the IdP JWKS endpoint
  groupClaim: groups      # claim holding the user's group list
  legacyHs256Enabled: true
  groupMappings: {}       # e.g. {"norviq-admins":{"role":"admin"},"team-a":{"role":"viewer","namespace":"team-a"}}

rbac:
  # The chart ships the norviq-admin / norviq-policy-editor / norviq-viewer ClusterRoles but no
  # subject bindings. Map them to your IdP groups or ServiceAccounts here. Gated off by default —
  # set enabled: true and fill `bindings`. See docs/engineering/production-config.md.
  exampleBindings:
    enabled: false
  bindings: []
    # - role: norviq-admin          # one of: norviq-admin | norviq-policy-editor | norviq-viewer
    #   kind: Group                 # Group | User | ServiceAccount
    #   name: norviq-platform-admins
    # - role: norviq-viewer
    #   kind: Group
    #   name: norviq-readonly
    # - role: norviq-policy-editor
    #   kind: ServiceAccount
    #   name: ci-policy-bot
    #   namespace: norviq

siem:
  # Outbound audit forwarder (SIEM). Off by default. When enabled the API streams new audit rows
  # to webhookUrl as NDJSON. The authenticated GET /api/v1/audit/export endpoint is always available.
  enabled: false
  webhookUrl: ""
  format: ndjson           # ndjson | syslog
  pollIntervalSeconds: 30
