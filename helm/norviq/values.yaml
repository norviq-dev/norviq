# SPDX-License-Identifier: Apache-2.0
namespace: norviq
policyQuotaNamespaces:
  - default
  - chatbot-prod
  - analytics
validatingAdmissionPolicyEnabled: true
baselineClusterPolicy:
  enabled: true
  name: baseline-cluster-guard
  clusterPriority: 900
  preset: strict

images:
  engine:
    repository: sanman97/norviq-engine
    tag: engine-latest
    pullPolicy: Always
  api:
    repository: sanman97/norviq-engine
    tag: api-latest
    pullPolicy: Always
  ui:
    repository: sanman97/norviq-engine
    tag: ui-latest
    pullPolicy: Always
  webhook:
    repository: sanman97/norviq-engine
    tag: webhook-latest
    pullPolicy: Always
  redis:
    repository: redis
    tag: "7-alpine"
  postgresql:
    repository: postgres
    tag: "16-alpine"

engine:
  replicas: 1
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8282

api:
  replicas: 1
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8080
  secretKey: "change-me-in-production"
  env:
    - name: NRVQ_DB_SSL_MODE
      value: "require"
    - name: NRVQ_DB_POOL_MAX_OVERFLOW
      value: "10"
    - name: NRVQ_DB_POOL_TIMEOUT
      value: "10"
    - name: NRVQ_DB_COMMAND_TIMEOUT
      value: "10"

ui:
  replicas: 1
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  port: 80

webhook:
  enabled: true
  validating:
    enabled: false
  replicas: 2
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  port: 8443
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

redis:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  port: 6379
  password: "norviq-redis-password"
  storage: 1Gi

postgresql:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 5432
  database: norviq
  username: norviq
  password: "norviq-pg-password"
  storage: 5Gi

otel:
  enabled: false
  endpoint: "http://otel-collector:4317"
  prometheusPort: 9090

ingress:
  enabled: false
  className: nginx
  host: norviq.example.com
  tls: false

config:
  logLevel: INFO
  enforcementMode: block
  trustThreshold: 0.7
  violationPenalty: 0.05
  rateLimit: 60
  dbSslMode: require
  dbPoolMaxOverflow: 10
  dbPoolTimeout: 10
  dbCommandTimeout: 10
