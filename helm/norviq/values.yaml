# SPDX-License-Identifier: Apache-2.0
# The install namespace is taken from `helm -n/--namespace` (.Release.Namespace), the
# standard Helm contract — there is no `namespace:` value. Install with:
#   helm install norviq ./helm/norviq -n <namespace> --create-namespace
# Per-tenant NrvqPolicy quota (ResourceQuota count/nrvqpolicies.norviq.io). OPT-IN: list the tenant
# namespaces you want protected — each must already exist. Empty by default so a fresh install never
# fails on a namespace that hasn't been created yet. Example: [prod-agents, analytics].
# Global settings shared across the chart.
global:
  # Air-gapped / private-mirror host prepended to the THIRD-PARTY images (opa, redis, postgres, the
  # internal-tls nginx proxy, the cert-bootstrap job, the helm-test curl). Empty = pull from their
  # public upstreams. Norviq's own images use images.registry (below) instead. Example:
  #   --set global.imageRegistry=myregistry.example.com
  # then mirror e.g. openpolicyagent/opa, redis, postgres into that registry preserving the path.
  imageRegistry: ""

policyQuotaNamespaces: []

# Mandatory-interception (defense-in-depth): Norviq's tool-call PEP is COOPERATIVE — the agent's
# SDK asks the sidecar for a forward/drop decision and the AGENT executes the tool itself. A pod that
# ignores the SDK can therefore reach tools directly (runtime bypass). This opt-in default-deny egress
# NetworkPolicy bounds that at the NETWORK layer: an agent pod may egress ONLY to the norviq API, DNS, and
# an operator-approved tool allowlist — arbitrary data-exfiltration egress is denied. It does NOT replace
# the PEP (per-call param policy still needs the SDK) and REQUIRES a NetworkPolicy-enforcing CNI
# (Calico/Cilium; kindnet ignores NetworkPolicy). Full non-cooperative enforcement (the sidecar executing
# tools) is a separate roadmap item.
agentEgressPolicy:
  enabled: false
  # Policy engine:
  #   networkpolicy (default) — a portable Kubernetes NetworkPolicy. Allowlist is IP/CIDR-based only.
  #   cilium                  — a CiliumNetworkPolicy that ALSO supports FQDN (hostname) allowlisting
  #                             (allowedFQDNs / allowedFQDNPatterns). Requires the Cilium CNI.
  engine: networkpolicy
  # Namespaces to lock down. Empty => reuse policyQuotaNamespaces (the tenant namespaces).
  namespaces: []
  allowDNS: true
  # Operator-approved tool endpoints the agent may reach (CIDRs). EVERYTHING ELSE (incl. the internet) is
  # denied. Leave empty ONLY if the agent's tools all live in the norviq namespace — otherwise its tool
  # calls will fail. Example: ["10.0.0.0/8"] for in-cluster tool services, or a SaaS API's egress CIDR.
  allowedCIDRs: []
  # engine=cilium ONLY: allow egress by HOSTNAME (Cilium's DNS-aware toFQDNs). Cleaner than chasing a SaaS
  # tool's rotating/CDN IPs. Exact names in allowedFQDNs, wildcards in allowedFQDNPatterns.
  #   allowedFQDNs:        ["api.openai.com", "api.anthropic.com"]
  #   allowedFQDNPatterns: ["*.googleapis.com"]
  allowedFQDNs: []
  allowedFQDNPatterns: []
  # Restrict the allowlisted CIDRs/FQDNs to these TCP ports (empty => all ports).
  allowedPorts: []
  # embedded sidecar mode reaches Redis/Postgres directly (not the API) — set true to also permit egress
  # to the norviq datastores. Leave false for the default proxy mode (sidecar → API only).
  embeddedDatastores: false
baselineClusterPolicy:
  enabled: true
  name: baseline-cluster-guard
  clusterPriority: 900
  preset: strict

images:
  # Registry prefix (trailing slash) prepended to every component repository. Defaults to the
  # project's public GHCR org, so `helm install` pulls the official public images out of the box.
  # Override to run your own build, e.g.:
  #   Your own GHCR:            "ghcr.io/<your-org>/"
  #   Google Artifact Registry: "us-docker.pkg.dev/<PROJECT_ID>/<REPO>/"
  #   ACR:                      "<acct>.azurecr.io/"
  #   Docker Hub:               "" (+ set repository to "<user>/norviq-engine")
  registry: "ghcr.io/norviq-dev/"
  # `digest` is empty here and is STAMPED BY THE RELEASE WORKFLOW (.github/workflows/release.yml).
  # When set it wins over `tag`, making a released chart reproducible: `--version X` always pulls the
  # exact image built, scanned and signed for X. Leave it empty to track the readable tag instead.
  engine:
    repository: norviq-engine
    tag: engine-latest
    digest: ""
    pullPolicy: Always
  api:
    repository: norviq-engine
    tag: api-latest
    digest: ""
    pullPolicy: Always
  ui:
    repository: norviq-engine
    tag: ui-latest
    digest: ""
    pullPolicy: Always
  webhook:
    repository: norviq-engine
    tag: webhook-latest
    digest: ""
    pullPolicy: Always
  redis:
    repository: redis
    tag: "7-alpine"
  postgresql:
    repository: postgres
    tag: "16-alpine"

# Pull secrets for the component images. The default public GHCR images need NONE (empty list).
# Set a pull-secret name here only if you point `images.registry` at a private registry.
imagePullSecrets: []

# Graceful shutdown: a preStop sleep lets the Service deregister the endpoint before SIGTERM so
# in-flight requests drain during a rolling upgrade. Applied to api/engine/webhook. 0 = no hook.
# `helm test` connection-probe pod image (curl). Override for an air-gapped mirror.
tests:
  image: "curlimages/curl:8.10.1"

gracefulShutdown:
  preStopSleepSeconds: 3

# Hardened container securityContext for the primary app containers (defense-in-depth). The
# chart sets it inline rather than relying on an external PSA/Kyverno restricted-profile mutation
# ("injected by cluster policy"), which need not exist on the target cluster.
# This restricted profile matches the opa/tls-proxy sidecars: non-root, no privilege escalation, all caps
# dropped, seccomp RuntimeDefault, read-only root FS. Consumers whose container writes its root FS must
# provide a writable emptyDir mount (the api/engine/webhook images already run as a non-root USER, and the
# webhook writes nothing to its rootfs). The UI (nginx) is NOT covered by this default — it runs as root
# and binds :80, so it needs a component-specific uid/port/emptyDir treatment. Set enabled:false to defer
# entirely to a cluster-level PodSecurity/Kyverno policy.
securityContext:
  enabled: true
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

engine:
  replicas: 1
  pdb:
    enabled: false     # multi-node prod: keep >=1 engine available during disruptions
    minAvailable: 1
  # HPA (multi-node prod): off by default (single node can't autoscale). Needs metrics-server.
  # When enabled the Deployment drops its static `replicas` and the HPA owns the count (min..max),
  # scaling on CPU and/or memory. The standalone engine is on the enforcement hot path, so give it
  # the same elasticity as the API in a prod profile (see values-prod.yaml).
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: ""   # "" = do not scale on memory; set e.g. 75 to add it
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8282

api:
  replicas: 2          # HA default: survive a single pod restart/drain without an enforcement gap
  pdb:
    enabled: true      # keep >=1 API pod available during voluntary disruptions (node drain/upgrade)
    minAvailable: 1
  # HPA (multi-node prod): off by default (single node can't autoscale). Needs metrics-server.
  # When enabled the Deployment drops its static `replicas` and the HPA owns the count, scaling
  # between minReplicas and maxReplicas on CPU and/or memory utilization.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: ""   # "" = do not scale on memory; set e.g. 75 to add it
  # Spread replicas across nodes (multi-node prod): podAntiAffinity + topologySpreadConstraints.
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  port: 8080
  # Leave this at the sentinel default and the chart AUTO-GENERATES a strong random secret on
  # first install (templates/secret.yaml), persisting it across `helm upgrade` (a live cluster lookup)
  # so upgrades never invalidate existing sessions/JWTs. Set an explicit value here to pin your own
  # secret instead (e.g. rotation, multi-cluster fleet trust) — it always wins over auto-generation.
  secretKey: "change-me-in-production"
  env:
    - name: NRVQ_DB_SSL_MODE
      value: "require"
    - name: NRVQ_DB_POOL_MAX_OVERFLOW
      value: "10"
    - name: NRVQ_DB_POOL_TIMEOUT
      value: "10"
    - name: NRVQ_DB_COMMAND_TIMEOUT
      value: "10"

ui:
  replicas: 1
  # Set to "/fleet-api" on the HUB cluster so the console shows the multi-cluster Fleet view (same-origin,
  # proxied by nginx to norviq-fleet-api). Empty on spokes/single-cluster → Fleet view stays gated off.
  fleetApiUrl: ""
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # The console runs on the unprivileged nginx image (uid 101) which binds an unprivileged
  # port, so the container does not run as root. 8080 needs no NET_BIND_SERVICE, letting the pod drop
  # ALL caps. The Service + probes reference the named "http" port, so this cascades automatically.
  port: 8080

webhook:
  enabled: true
  # Turnkey sidecar injection: render the MutatingWebhookConfiguration from the chart and
  # auto-bootstrap TLS via a pre/post-install hook Job (self-signs a cert, writes the
  # norviq-webhook-tls secret, patches the webhook caBundle). No cert-manager required.
  # Enable with --set webhook.injection.enabled=true, then label target namespaces:
  #   kubectl label ns <ns> norviq-injection=enabled
  injection:
    enabled: false
    # Injected-sidecar evaluation mode. "proxy" (DEFAULT) = the sidecar POSTs each tool call to
    # the central norviq-api /evaluate with a namespace-scoped service JWT (DB/OPA stay centralized,
    # nothing per-pod). "embedded" = the sidecar runs its own RedisCache+OPA(subprocess)+PolicyLoader
    # for air-gapped/edge (the chart then wires NRVQ_REDIS_URL/NRVQ_PG_URL through to the injector).
    sidecarMode: proxy
    # Admission failure posture for the injector. "Fail" (DEFAULT) = fail-CLOSED: if the injector is
    # unavailable, pod creation in an injection-enabled namespace is REJECTED so an agent pod can never
    # start un-guarded (correct for a policy-enforcement product; the webhook is HA — 2 replicas + PDB,
    # and the control-plane/kube-system namespaces are excluded from the selector so this never self-
    # deadlocks). Set "Ignore" (fail-open) only for a dev/eval cluster where an un-injected pod is
    # acceptable.
    failurePolicy: Fail
    # Honor the per-pod injection opt-out (norviq-injection=disabled label / norviq.io/skip-injection
    # annotation)? Default true (backward-compatible). Set false to make injection namespace-uniform — a
    # pod author in an injection-enabled namespace cannot self-exempt their workload from
    # enforcement (a real bypass otherwise). Pair with RBAC on pod label/annotation writes.
    allowPodOptOut: true
    # Image with kubectl + openssl for the cert-bootstrap hook Job. alpine/k8s ships both and is
    # publicly pullable (bitnami/kubectl tags were removed from Docker Hub in the 2025 Bitnami change).
    certJobImage: "alpine/k8s:1.30.0"
  replicas: 2
  pdb:
    enabled: false     # multi-node prod
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: ""   # "" = do not scale on memory; set e.g. 75 to add it
  spread:
    enabled: false
  rollout:
    maxSurge: 1        # production default: zero-downtime (needs node headroom for a surge pod)
    maxUnavailable: 0
  port: 8443
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Inject the SPIFFE Workload API socket + workload-api mode into injected workloads. OFF by default
  # (needs SPIRE + the SPIFFE CSI driver). Uses config.spiffeMode/spiffeSocket for the injected env.
  spiffe:
    inject: false
  # The controller mints its API bearer via OIDC client-credentials (Keycloak service client) instead
  # of the HS256 service token. OFF by default (HS256 fallback). Set the client secret in api.oidcClientSecret.
  oidc:
    enabled: false
    tokenUrl: ""        # e.g. http://keycloak.localtest.me:8080/realms/norviq/protocol/openid-connect/token
    clientId: norviq-webhook
    clientSecret: ""    # the Keycloak confidential client secret (rendered into norviq-secrets when enabled)

redis:
  enabled: true
  replicas: 1
  # HA (multi-node prod, GATED, not live-validated on 1 node): when true, render a Redis HA topology
  # (Sentinel) instead of the single StatefulSet. Requires the operator/Sentinel chart pre-installed.
  ha:
    enabled: false
    replicas: 3
    serviceName: norviq-redis-ha
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  port: 6379
  password: "norviq-redis-password"
  storage: 1Gi

postgresql:
  enabled: true
  replicas: 1
  # HA (multi-node prod, GATED, not live-validated on 1 node): when true, render a CloudNativePG
  # `Cluster` (3 instances) instead of the single StatefulSet, and point the API's PG URL at its
  # service. Requires the CloudNativePG operator pre-installed in the cluster.
  ha:
    enabled: false
    instances: 3
    serviceName: norviq-postgresql-ha-rw
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 5432
  database: norviq
  username: norviq
  password: "norviq-pg-password"
  storage: 5Gi

otel:
  # OTLP trace export to a collector (gRPC), gated by this flag. Empty endpoint by default: enabling
  # trace export requires you to point it at a real collector (--set otel.endpoint=http://<collector>:4317).
  # The chart FAILS the render if enabled=true with an empty endpoint, so spans are never silently
  # dropped into a void. (No collector ships with Norviq — deploy one, e.g. an OpenTelemetry Collector or
  # Grafana Tempo, and set the endpoint to its OTLP gRPC address.)
  enabled: false
  endpoint: ""
  # Prometheus metrics are ALWAYS served at /metrics on the norviq-api Service port (api.port),
  # regardless of otel.enabled. There is NO separate metrics port. The knobs below only control how your
  # Prometheus DISCOVERS that endpoint — nothing here changes whether metrics are produced. NOTE: counters
  # are per-replica and in-memory, so with api.replicas > 1 you MUST scrape per-pod (ServiceMonitor or the
  # scrape annotations below) and sum across pods — a single Service-level scrape reads only one replica.
  metrics:
    # Annotation-based discovery: add prometheus.io/scrape + port + path to the norviq-api Service,
    # for a Prometheus configured to scrape by pod/service annotations.
    scrapeAnnotations: false
    # Prometheus Operator (kube-prometheus-stack) ServiceMonitor. Requires the monitoring.coreos.com
    # CRDs to be installed (they ship with the operator); enable only when you run it.
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      # Extra labels so your Prometheus's serviceMonitorSelector picks this up
      # (e.g. {release: kube-prometheus-stack}).
      additionalLabels: {}

# Long-lived OPA policy engine, run as a sidecar in the api and engine pods (localhost:8181).
# Each replica gets its own OPA -> no shared single point of failure. config.opaMode=server (default)
# queries it over HTTP; set config.opaMode=subprocess to roll back to the per-call `opa eval` fork.
# Pinned (not `latest-static`) so the running OPA version stays matched to the one
# scripts/gen-opa-capabilities.py generated helm/norviq/files/opa-capabilities.json from (verified real,
# multi-arch amd64+arm64, via `docker manifest inspect openpolicyagent/opa:1.18.0-static`) — `latest-static`
# could silently drift to a version with a different builtin set than what the engine-layer capabilities
# check (norviq/engine/opa_client.py::_check_capabilities) validates against.
opa:
  enabled: true
  image: "openpolicyagent/opa:1.18.0-static"
  port: 8181
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: norviq.example.com
  # TLS for the enterprise HTTPS path. Set true and either pre-create the secret named below or use a
  # cert-manager issuer annotation (see `annotations`). Leaving false serves plaintext (dev only).
  tls: false
  tlsSecretName: norviq-ingress-tls
  # Extra ingress annotations (e.g. cert-manager.io/cluster-issuer, body-size, timeouts). The console
  # nginx already proxies /api/* to the API, so a single host routes both UI and API — no path rewrite.
  annotations: {}

config:
  # Zero-touch internal TLS/mTLS for control-plane traffic. When true (DEFAULT), a Helm hook auto-mints
  # an internal CA + the API serving cert, the API pod runs a TLS terminator on :8443, and the injector
  # gives each sidecar a CA-signed client cert for mTLS to the control plane — all automatic, no operator
  # certs/CSRs. Set false only for a plaintext dev cluster.
  internalTls:
    enabled: true
    proxyImage: "nginx:1.27-alpine"
    # Resources for the api tls-proxy sidecar (nginx terminating internal TLS on :8443).
    proxyResources:
      requests: { cpu: 10m, memory: 24Mi }
      limits: { memory: 64Mi }
  logLevel: INFO
  enforcementMode: block
  noPolicyDecision: deny   # No-policy namespace -> deny in block mode ("allow" restores fail-open)
  # OPA evaluation runtime: "server" (HTTP to the sidecar) or "subprocess" (per-call fork, rollback).
  opaMode: server
  # Refuse to start (fail-closed) on a weak/default/short JWT secret or the default admin
  # password. Defaults true — pairs with api.secretKey's auto-generation above, so a stock install is
  # secure without any operator action. Set false only for a throwaway/dev cluster.
  requireStrongSecret: true
  trustThreshold: 0.7
  violationPenalty: 0.05
  rateLimit: 60
  dbSslMode: require
  dbPoolMaxOverflow: 10
  dbPoolTimeout: 10
  dbCommandTimeout: 10
  # Data retention (keeps the store + UI bounded). NONE of these ever touch an enforcing policy or the
  # current-enforcing version — retention is decoupled from enforcement, and enforcing policies never
  # expire. One hourly background pruner applies every window; 0 (or negative) on any window disables
  # that window (keep forever).
  retention:
    # Audit log — 30d default: the console never displays a window longer than 30d, so anything older
    # serves only external compliance horizons. SOC2/ISO users: raise to 90-365; use the audit-evidence
    # export packs for durable long-term evidence.
    auditRetentionDays: 30
    coverageSnapshotRetentionDays: 30   # compliance trend points + export events (covers the 30d trend view)
    graphSnapshotKeepPerNamespace: 10   # asset-graph snapshots: keep newest N per namespace (readers use only the newest)
    agentRegistryRetentionDays: 90      # remove agent identities unseen for N days (0 = keep forever)
    apiKeyDefaultTtlDays: 90            # NEW API keys default to N-day expiry (per-key override at creation; 0 = never)
    draftTtlDays: 14           # real intent drafts auto-expire after N days
    draftTtlTestHours: 24      # test/e2e (synthetic-class) drafts expire fast
    draftCapPerNamespace: 50   # hard ceiling of real drafts per namespace (evict oldest beyond it)
    draftsPageSize: 15         # bounded drafts endpoint page size (top-N newest + total)
    policyVersionKeepCount: 20 # keep at least the last N versions per policy
    policyVersionKeepDays: 90  # ...and any version within this window; prune older EXCEPT the current
    # Red-team run retention (read-only evidence; the latest run per namespace is never pruned).
    redteamDetailKeepRuns: 1   # keep full per-attack DETAIL for the newest N runs / namespace (last-run-only default; raise for more history)
    redteamDetailKeepDays: 7   # ...or any run within N days; older runs are detail-pruned (summary kept)
    redteamSummaryKeepRuns: 20 # keep SUMMARIES (no detail) for the newest N runs / namespace
    redteamSummaryKeepDays: 30 # ...or any run within N days; older runs are deleted entirely
    redteamHistoryPageSize: 20 # bounded /redteam/results history page size (summaries only)
  # Workload-identity resolution: "mock" (env-var identity; default) or "workload-api" (real SPIFFE
  # SVID, fail-closed). workload-api requires SPIRE on the cluster + pyspiffe installed.
  spiffeMode: mock
  # SPIFFE Workload API socket path (where the SPIFFE CSI driver publishes the agent socket).
  spiffeSocket: /spiffe-workload-api/spire-agent.sock
  # Gate the csi.spiffe.io volume on api/engine pods. OFF by default so deploys WITHOUT SPIRE are
  # unaffected (a csi.spiffe.io volume with no driver/registration wedges pod creation). Turn on
  # ONLY where SPIRE + the SPIFFE CSI driver are installed (e.g. the identity-local kind stack).
  spiffeCsi:
    enabled: false

# OIDC / SSO. Default-off: the API keeps validating legacy HS256 tokens until
# an IdP is wired. Enabling adds RS256/ES256 validation ALONGSIDE HS256 (set legacyHs256Enabled:false
# at cutover). Map IdP groups -> Norviq (role, namespace) via groupMappings (GitOps).
# Local username/password login — the PRIMARY no-IdP path. On a fresh install you sign in with
# adminUsername/adminPassword and are FORCED to change the password on first login. The password is stored
# hashed (bcrypt) in the API's DB; only the seed lives in norviq-secrets. Keep it strong for real installs —
# with config.requireStrongSecret=true the API refuses to start while adminPassword is still the default "norviq".
auth:
  enabled: true            # set false to disable local login (SSO/CLI-only)
  adminUsername: "admin"
  # Leave this at the sentinel default and the chart AUTO-GENERATES a strong random first
  # password (templates/secret.yaml), persisted across `helm upgrade` like api.secretKey. Retrieve it
  # with `kubectl get secret norviq-secrets -o jsonpath='{.data.NRVQ_AUTH_ADMIN_PASSWORD}' | base64 -d`.
  # You are forced to change it on first login either way. Set an explicit value here to pin your own.
  adminPassword: "norviq"
  sessionTtlSeconds: 3600  # short-lived session token
  # Brute-force lockout: after maxAttempts failed logins for a username within windowSeconds, lock out (429).
  loginMaxAttempts: 5
  loginWindowSeconds: 300
  minPasswordLength: 12    # enforced on a NEW password at change-time

oidc:
  enabled: false
  issuer: ""              # https://<tenant>/  (the token `iss`)
  audience: ""            # the API's client/audience id (the token `aud`)
  # The PUBLIC (browser/SPA) OIDC client id the console uses for Auth Code + PKCE sign-in.
  # Register a SPA/public client in your IdP with redirect URI <console>/auth/callback. When set (and
  # oidc.enabled), the UI renders "Sign in with SSO" — no UI rebuild needed (injected at runtime).
  consoleClientId: ""
  providerName: ""        # Human-readable IdP name shown in login copy (e.g. "Okta"); optional
  jwksUrl: ""             # the IdP JWKS endpoint
  groupClaim: groups      # claim holding the user's group list
  legacyHs256Enabled: true
  groupMappings: {}       # e.g. {"norviq-admins":{"role":"admin"},"team-a":{"role":"viewer","namespace":"team-a"}}

rbac:
  # The chart ships the norviq-admin / norviq-policy-editor / norviq-viewer ClusterRoles but no
  # subject bindings. Map them to your IdP groups or ServiceAccounts here. Gated off by default —
  # set enabled: true and fill `bindings`. See docs/engineering/production-config.md.
  exampleBindings:
    enabled: false
  bindings: []
    # - role: norviq-admin          # one of: norviq-admin | norviq-policy-editor | norviq-viewer
    #   kind: Group                 # Group | User | ServiceAccount
    #   name: norviq-platform-admins
    # - role: norviq-viewer
    #   kind: Group
    #   name: norviq-readonly
    # - role: norviq-policy-editor
    #   kind: ServiceAccount
    #   name: ci-policy-bot
    #   namespace: norviq

siem:
  # Outbound audit forwarder (SIEM). Off by default. When enabled the API streams new audit rows
  # to webhookUrl as NDJSON. The authenticated GET /api/v1/audit/export endpoint is always available.
  enabled: false
  webhookUrl: ""
  format: ndjson           # ndjson | syslog
  pollIntervalSeconds: 30

# Multi-cluster fleet (read-only). EVERYTHING off by default -> a single-cluster install
# renders ZERO fleet resources and behaves exactly as today. `enabled` turns on the SPOKE relay env
# (the api pushes rollups to the hub); `hub.enabled` renders the fleet-api + its dedicated postgres
# (only on the cluster that hosts the control plane). Fire-and-forget: a hub outage never affects
# local enforcement.
fleet:
  enabled: false              # spoke: run the in-process relay (pushes agent+audit rollups to the hub)
  clusterId: ""               # this cluster's id in the fleet
  clusterName: ""
  region: ""
  apiUrl: ""                  # hub base URL the relay posts to (e.g. http://fleet-api.norviq.svc:8080)
  relayIntervalSeconds: 60
  pullIntervalSeconds: 60     # How often the spoke pulls + verifies + applies the signed bundle
  staleAfterSeconds: 180      # hub: heartbeat older than this -> cluster status "stale"
  residency: false            # This spoke keeps raw audit in-cluster (rollups still leave; drill-down blocked)
  bundlePubkey: ""            # The fleet signing PUBLIC key (trust root). Empty -> spoke applies NO bundle.
  oidc:                       # relay->hub auth (OIDC client-credentials; HS256 break-glass fallback)
    tokenUrl: ""
    clientId: ""
    clientSecret: ""
  hub:
    enabled: false            # render the fleet-api control plane + dedicated fleet-postgresql
    pgUrl: "postgresql://norviq:norviq_dev@fleet-postgresql:5432/norviq_fleet"
    signingKey: ""            # The fleet signing PRIVATE key PEM (hub only; distinct from api.secretKey)
    signingKeySecretName: ""  # Instead of inlining signingKey, read NRVQ_FLEET_SIGNING_KEY from this pre-created Secret
    bundleTtlSeconds: 900
    replicas: 1
    storage: 5Gi
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
    pdb:
      enabled: false          # prod HA: keep N-1 fleet-api pods during disruptions
      minAvailable: 1
    autoscaling:
      enabled: false          # prod HA: CPU HPA (needs metrics-server)
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    spread:
      enabled: false          # prod HA: podAntiAffinity + topologySpread across nodes
    postgresql:
      database: norviq_fleet
      username: norviq
      password: norviq_dev
      port: 5432
      storage: 5Gi
      ha:
        enabled: false        # prod HA: CloudNativePG Cluster instead of the single StatefulSet
        instances: 3
        serviceName: fleet-postgresql-ha-rw
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { cpu: 500m, memory: 512Mi }
