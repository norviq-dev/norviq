apiVersion: v1
kind: Service
metadata:
  name: norviq-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: norviq-api
    {{- include "norviq.componentLabels" (dict "root" $ "component" "api") | nindent 4 }}
  {{- if .Values.otel.metrics.scrapeAnnotations }}
  annotations:
    # Annotation-based Prometheus discovery of the /metrics endpoint (served on api.port).
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.api.port | quote }}
    prometheus.io/path: /metrics
  {{- end }}
spec:
  selector:
    app: norviq-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.config.internalTls.enabled }}
    # TLS (+optional mTLS) terminator port — the encrypted control-plane endpoint cross-pod clients use.
    - port: 8443
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
