apiVersion: v1
kind: Service
metadata:
  name: norviq-api
  namespace: {{ .Values.namespace }}
  labels:
    app: norviq-api
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  selector:
    app: norviq-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.config.internalTls.enabled }}
    # TLS (+optional mTLS) terminator port — the encrypted control-plane endpoint cross-pod clients use.
    - port: 8443
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
