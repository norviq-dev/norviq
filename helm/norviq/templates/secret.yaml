{{- $secretName := "norviq-secrets" }}
{{/* Never ship literal shipped-default secrets. `lookup` only sees a LIVE cluster (it returns
     an empty dict during `helm template` / `--dry-run`, with no error) -- computed once, reused below
     for both the JWT secret and the default admin password so an upgrade never re-randomizes either
     one (that would invalidate every live session/JWT, and every fleet spoke trusting this hub). Only
     `helm install`/`upgrade` against the real cluster benefit from the persisted value; offline
     rendering always falls back to a freshly generated value -- expected and harmless for validation. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- /* With config.requireStrongSecret on (the hardened/prod posture) refuse to render the main
       datastore URLs (NRVQ_PG_URL / NRVQ_REDIS_URL, below) with an EMPTY password. The prod overlay
       (values-prod.yaml) blanks postgresql.password / redis.password precisely so a prod install MUST
       supply a strong credential (--set postgresql.password=... / redis.password=...) instead of silently
       shipping the well-known shipped default. Fails LOUDLY at render/install time — mirrors the
       fleet-store guard (fleet-hub.yaml:8-11) and the API's requireStrongSecret JWT/admin guards. The
       single-node dev defaults are NON-empty, so a plain `helm install` (dev/eval) is unaffected. */}}
{{- if .Values.config.requireStrongSecret }}
{{- if eq (.Values.postgresql.password | default "") "" }}
{{- fail "config.requireStrongSecret=true but postgresql.password is empty -- set a strong DB password (--set postgresql.password=...) so NRVQ_PG_URL never ships a blank/default credential." }}
{{- end }}
{{- if eq (.Values.redis.password | default "") "" }}
{{- fail "config.requireStrongSecret=true but redis.password is empty -- set a strong cache password (--set redis.password=...) so NRVQ_REDIS_URL never ships a blank/default credential." }}
{{- end }}
{{- end }}

{{- $apiSecretKey := .Values.api.secretKey }}
{{- if eq $apiSecretKey "change-me-in-production" }}
  {{/* Self-generate a strong random JWT secret (randAlphaNum, well above the require_strong_secret
       >=16-char floor) on first install. An explicit non-default api.secretKey always wins verbatim.
       Reuse the value already deployed on an upgrade -- UNLESS that deployed value is ITSELF still the
       weak literal default (a release installed without this auto-generation): perpetuating a known
       weak secret across an upgrade would defeat the purpose, so that case generates a
       fresh strong secret instead (this does rotate/invalidate live sessions for that one upgrade --
       correct, since anyone could already forge tokens against the well-known default). */}}
  {{- $reuse := "" }}
  {{- if and $existing $existing.data (hasKey $existing.data "NRVQ_API_SECRET_KEY") }}
    {{- $reuse = index $existing.data "NRVQ_API_SECRET_KEY" | b64dec }}
  {{- end }}
  {{- if and $reuse (ne $reuse "change-me-in-production") (ge (len $reuse) 16) }}
    {{- $apiSecretKey = $reuse }}
  {{- else }}
    {{- $apiSecretKey = randAlphaNum 48 }}
  {{- end }}
{{- end }}

{{- $adminPassword := .Values.auth.adminPassword | default "norviq" }}
{{- if eq $adminPassword "norviq" }}
  {{/* Same treatment for the seeded default-admin password: with requireStrongSecret=true (now the
       chart default) the API refuses to boot while the admin is still on the literal shipped default,
       so leaving this un-generated would brick a stock install. The seeded admin ALWAYS has
       must_change=true (auth_login.ensure_default_admin), so a random first password is strictly safer
       than "norviq" for everyone and costs nothing at first login -- retrieve it with:
       kubectl get secret norviq-secrets -n {{ .Release.Namespace }} -o jsonpath='{.data.NRVQ_AUTH_ADMIN_PASSWORD}' | base64 -d
       An explicit non-default auth.adminPassword always wins verbatim; same reuse-unless-still-weak
       rule as the JWT secret above applies across upgrades. */}}
  {{- $reuse := "" }}
  {{- if and $existing $existing.data (hasKey $existing.data "NRVQ_AUTH_ADMIN_PASSWORD") }}
    {{- $reuse = index $existing.data "NRVQ_AUTH_ADMIN_PASSWORD" | b64dec }}
  {{- end }}
  {{- if and $reuse (ne $reuse "norviq") }}
    {{- $adminPassword = $reuse }}
  {{- else }}
    {{- $adminPassword = randAlphaNum 20 }}
  {{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
type: Opaque
stringData:
  NRVQ_API_SECRET_KEY: {{ $apiSecretKey | quote }}
  {{- if .Values.auth.enabled }}
  # Seed credentials for the default local admin. The plaintext seed is hashed (bcrypt) at first boot;
  # only the hash is persisted in the API DB. The password is auto-generated (see above) unless you set
  # auth.adminPassword explicitly; either way you are forced to change it on first login (must_change=true).
  NRVQ_AUTH_ADMIN_USERNAME: {{ .Values.auth.adminUsername | default "admin" | quote }}
  NRVQ_AUTH_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  {{- end }}
  {{- $redisHost := ternary .Values.redis.ha.serviceName "norviq-redis" .Values.redis.ha.enabled }}
  {{- $pgHost := ternary .Values.postgresql.ha.serviceName "norviq-postgresql" .Values.postgresql.ha.enabled }}
  NRVQ_REDIS_URL: "redis://:{{ .Values.redis.password }}@{{ $redisHost }}:{{ .Values.redis.port }}"
  NRVQ_PG_URL: "postgresql://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@{{ $pgHost }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
  {{- if .Values.webhook.oidc.enabled }}
  # Client secret for the controller's OIDC client-credentials grant (Keycloak norviq-webhook client).
  NRVQ_OIDC_CLIENT_SECRET: {{ .Values.webhook.oidc.clientSecret | default "" | quote }}
  {{- end }}
  {{- if .Values.fleet.enabled }}
  # Client secret for the spoke relay's OIDC client-credentials grant to the fleet hub.
  NRVQ_FLEET_OIDC_CLIENT_SECRET: {{ .Values.fleet.oidc.clientSecret | default "" | quote }}
  {{- end }}
  {{- if .Values.fleet.hub.enabled }}
  # The fleet bundle signing PRIVATE key (hub-only trust root; distinct from NRVQ_API_SECRET_KEY).
  NRVQ_FLEET_SIGNING_KEY: {{ .Values.fleet.hub.signingKey | default "" | quote }}
  {{- end }}
