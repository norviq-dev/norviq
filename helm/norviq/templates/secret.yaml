apiVersion: v1
kind: Secret
metadata:
  name: norviq-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
type: Opaque
stringData:
  NRVQ_API_SECRET_KEY: {{ .Values.api.secretKey | quote }}
  NRVQ_REDIS_URL: "redis://:{{ .Values.redis.password }}@norviq-redis:{{ .Values.redis.port }}"
  NRVQ_PG_URL: "postgresql://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@norviq-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
