{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: norviq-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: norviq-ui
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: norviq-api
                port:
                  number: {{ .Values.api.port }}
{{- end }}
