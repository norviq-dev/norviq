{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-webhook
  namespace: {{ .Values.namespace }}
  labels:
    app: norviq-webhook
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webhook.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.webhook.rollout.maxSurge }}
      maxUnavailable: {{ .Values.webhook.rollout.maxUnavailable }}
  selector:
    matchLabels:
      app: norviq-webhook
  template:
    metadata:
      labels:
        app: norviq-webhook
    spec:
      serviceAccountName: norviq-controller
      {{- include "norviq.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.webhook.spread.enabled }}
      {{- include "norviq.spread" (dict "app" "norviq-webhook") | nindent 6 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        # Controller reconciles NrvqPolicy CRs by POSTing to the API — wait for it.
        # Safe: the sidecar-injector webhook is failurePolicy=Ignore and excludes the
        # control-plane namespace, so a not-yet-ready webhook never blocks pod creation.
        - name: wait-for-api
          image: busybox:1.36
          command: ['sh','-c','until nc -z norviq-api {{ .Values.api.port }}; do echo waiting for api; sleep 2; done']
          securityContext:
            # Webhook pods carry a restricted securityContext (runAsNonRoot) injected by
            # cluster policy; busybox defaults to root, so pin a non-root user. `nc -z`
            # needs no root, caps, or filesystem writes.
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: webhook
          image: "{{ .Values.images.registry }}{{ .Values.images.webhook.repository }}:{{ .Values.images.webhook.tag }}"
          imagePullPolicy: {{ .Values.images.webhook.pullPolicy }}
          {{- include "norviq.preStop" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.webhook.port }}
              name: https
          env:
            - name: NRVQ_WEBHOOK_PORT
              value: "{{ .Values.webhook.port }}"
            # Pinned (-sha on CI) sidecar image. The controller refuses a mutable-tag CRD override.
            - name: NRVQ_SIDECAR_IMAGE
              value: "{{ .Values.images.registry }}{{ .Values.images.engine.repository }}:{{ .Values.images.engine.tag }}"
            - name: NRVQ_CONTROLLER_ENABLED
              value: "true"
            # FQDN (namespace-qualified) so the value is resolvable BOTH from the controller (in this
            # namespace) AND from thin-proxy sidecars injected into OTHER tenant namespaces (SIDE-2).
            - name: NRVQ_API_URL
              value: "http://norviq-api.{{ .Values.namespace }}.svc:{{ .Values.api.port }}"
            - name: NRVQ_ADMIN_POLICY_NAMESPACE
              value: "{{ .Values.namespace }}"
            # SIDE-2: mode injected into sidecars. "proxy" (default) = thin sidecar POSTs to the central
            # /evaluate with a minted namespace-scoped service JWT (nothing per-pod); "embedded" = full
            # local engine for air-gapped/edge (needs the datastore wiring below).
            - name: NRVQ_SIDECAR_MODE
              value: {{ .Values.webhook.injection.sidecarMode | default "proxy" | quote }}
            {{- if eq (.Values.webhook.injection.sidecarMode | default "proxy") "embedded" }}
            # Embedded sidecars run their own RedisCache + OPA(subprocess) + PolicyLoader, so the injector
            # must propagate the datastore wiring. The thin-proxy default needs none of this.
            - name: NRVQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_REDIS_URL
            - name: NRVQ_PG_URL
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_PG_URL
            - name: NRVQ_DB_SSL_MODE
              value: {{ .Values.config.dbSslMode | quote }}
            - name: NRVQ_SIDECAR_OPA_MODE
              value: "subprocess"
            {{- end }}
            # HS256 signing key for the controller's short-lived service JWT (API auth).
            - name: NRVQ_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_API_SECRET_KEY
            - name: NRVQ_TLS_CERT
              value: /etc/webhook/certs/tls.crt
            - name: NRVQ_TLS_KEY
              value: /etc/webhook/certs/tls.key
            {{- if .Values.webhook.spiffe.inject }}
            # B3: injected workloads also get the SPIFFE Workload API socket + workload-api mode.
            - name: NRVQ_SPIFFE_INJECT
              value: "true"
            - name: NRVQ_SPIFFE_MODE
              value: {{ .Values.config.spiffeMode | default "mock" | quote }}
            - name: NRVQ_SPIFFE_SOCKET
              value: {{ .Values.config.spiffeSocket | default "/spiffe-workload-api/spire-agent.sock" | quote }}
            {{- end }}
            {{- if .Values.webhook.oidc.enabled }}
            # B4: mint the controller's API bearer via OIDC client-credentials (Keycloak); HS256 fallback kept.
            - name: NRVQ_OIDC_TOKEN_URL
              value: {{ .Values.webhook.oidc.tokenUrl | quote }}
            - name: NRVQ_OIDC_CLIENT_ID
              value: {{ .Values.webhook.oidc.clientId | quote }}
            - name: NRVQ_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_OIDC_CLIENT_SECRET
            {{- end }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: webhook-certs
          secret:
            secretName: norviq-webhook-tls
{{- end }}
