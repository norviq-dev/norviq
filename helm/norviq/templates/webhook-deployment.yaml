{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-webhook
  namespace: {{ .Values.namespace }}
  labels:
    app: norviq-webhook
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  {{- /* When the HPA owns the replica count, the Deployment must NOT also set `replicas` — otherwise every
         reconcile resets it and fights the autoscaler (scale-up flapping). Omit it when autoscaling is on. */}}
  {{- if not .Values.webhook.autoscaling.enabled }}
  replicas: {{ .Values.webhook.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.webhook.rollout.maxSurge }}
      maxUnavailable: {{ .Values.webhook.rollout.maxUnavailable }}
  selector:
    matchLabels:
      app: norviq-webhook
  template:
    metadata:
      labels:
        app: norviq-webhook
        app.kubernetes.io/component: webhook
    spec:
      serviceAccountName: norviq-controller
      {{- include "norviq.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.webhook.spread.enabled }}
      {{- include "norviq.spread" (dict "app" "norviq-webhook") | nindent 6 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        # Controller reconciles NrvqPolicy CRs by POSTing to the API — wait for it.
        # Safe: the sidecar-injector's namespaceSelector excludes the control-plane namespace
        # (.Values.namespace; see webhook-config.yaml:27-34), so a not-yet-ready webhook never
        # blocks creation of these control-plane pods — even though failurePolicy defaults to Fail
        # (fail-closed) for injection-enabled tenant namespaces.
        {{- include "norviq.waitFor" (dict "name" "wait-for-api" "host" "norviq-api" "port" .Values.api.port) | nindent 8 }}
      containers:
        - name: webhook
          image: "{{ include "norviq.image" (dict "root" $ "component" .Values.images.webhook) }}"
          imagePullPolicy: {{ .Values.images.webhook.pullPolicy }}
          {{- /* Hardened container securityContext (defense-in-depth; do not rely on an external
                 PSA/Kyverno mutation). The webhook image runs as USER 65534 and writes nothing to its
                 rootfs, so read-only root FS is safe here. */}}
          {{- with .Values.securityContext }}
          {{- if .enabled }}
          securityContext:
            {{- omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- include "norviq.preStop" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.webhook.port }}
              name: https
          env:
            - name: NRVQ_WEBHOOK_PORT
              value: "{{ .Values.webhook.port }}"
            # Pinned (-sha on CI) sidecar image. The controller refuses a mutable-tag CRD override.
            - name: NRVQ_SIDECAR_IMAGE
              value: "{{ include "norviq.image" (dict "root" $ "component" .Values.images.engine) }}"
            - name: NRVQ_CONTROLLER_ENABLED
              value: "true"
            # FQDN (namespace-qualified) so the value is resolvable BOTH from the controller (in this
            # namespace) AND from thin-proxy sidecars injected into OTHER tenant namespaces.
            - name: NRVQ_API_URL
              {{- if .Values.config.internalTls.enabled }}
              value: "https://norviq-api.{{ .Values.namespace }}.svc:8443"
              {{- else }}
              value: "http://norviq-api.{{ .Values.namespace }}.svc:{{ .Values.api.port }}"
              {{- end }}
            {{- if .Values.config.internalTls.enabled }}
            # Auto-mTLS: controller verifies the API cert against the internal CA; injector signs a
            # per-namespace client cert from the CA (ca.key) for sidecar mTLS. Mounted below.
            - name: NRVQ_INTERNAL_TLS
              value: "true"
            - name: NRVQ_CA_CERT_FILE
              value: /etc/norviq/ca/ca.crt
            - name: NRVQ_CA_KEY_FILE
              value: /etc/norviq/ca/ca.key
            {{- end }}
            - name: NRVQ_ADMIN_POLICY_NAMESPACE
              value: "{{ .Values.namespace }}"
            # Mode injected into sidecars. "proxy" (default) = thin sidecar POSTs to the central
            # /evaluate with a minted namespace-scoped service JWT (nothing per-pod); "embedded" = full
            # local engine for air-gapped/edge (needs the datastore wiring below).
            - name: NRVQ_SIDECAR_MODE
              value: {{ .Values.webhook.injection.sidecarMode | default "proxy" | quote }}
            {{- if eq (.Values.webhook.injection.sidecarMode | default "proxy") "embedded" }}
            # Embedded sidecars run their own RedisCache + OPA(subprocess) + PolicyLoader, so the injector
            # must propagate the datastore wiring. The thin-proxy default needs none of this.
            - name: NRVQ_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_REDIS_URL
            - name: NRVQ_PG_URL
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_PG_URL
            - name: NRVQ_DB_SSL_MODE
              value: {{ .Values.config.dbSslMode | quote }}
            - name: NRVQ_SIDECAR_OPA_MODE
              value: "subprocess"
            {{- end }}
            # HS256 signing key for the controller's short-lived service JWT (API auth).
            - name: NRVQ_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_API_SECRET_KEY
            - name: NRVQ_TLS_CERT
              value: /etc/webhook/certs/tls.crt
            - name: NRVQ_TLS_KEY
              value: /etc/webhook/certs/tls.key
            {{- if not .Values.webhook.injection.allowPodOptOut }}
            # Pod-level opt-out disabled — the injector ignores norviq-injection=disabled / skip-injection.
            - name: NRVQ_ALLOW_POD_OPT_OUT
              value: "false"
            {{- end }}
            {{- if .Values.webhook.spiffe.inject }}
            # Injected workloads also get the SPIFFE Workload API socket + workload-api mode.
            - name: NRVQ_SPIFFE_INJECT
              value: "true"
            - name: NRVQ_SPIFFE_MODE
              value: {{ .Values.config.spiffeMode | default "mock" | quote }}
            - name: NRVQ_SPIFFE_SOCKET
              value: {{ .Values.config.spiffeSocket | default "/spiffe-workload-api/spire-agent.sock" | quote }}
            {{- end }}
            {{- if .Values.webhook.oidc.enabled }}
            # Mint the controller's API bearer via OIDC client-credentials (Keycloak); HS256 fallback kept.
            - name: NRVQ_OIDC_TOKEN_URL
              value: {{ .Values.webhook.oidc.tokenUrl | quote }}
            - name: NRVQ_OIDC_CLIENT_ID
              value: {{ .Values.webhook.oidc.clientId | quote }}
            - name: NRVQ_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: norviq-secrets
                  key: NRVQ_OIDC_CLIENT_SECRET
            {{- end }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
            {{- if .Values.config.internalTls.enabled }}
            - name: internal-ca
              mountPath: /etc/norviq/ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: webhook-certs
          secret:
            secretName: norviq-webhook-tls
        {{- if .Values.config.internalTls.enabled }}
        - name: internal-ca
          secret:
            secretName: norviq-internal-ca
        {{- end }}
{{- end }}
