apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-api
  namespace: {{ .Values.namespace }}
  labels:
    app: norviq-api
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.api.rollout.maxSurge }}
      maxUnavailable: {{ .Values.api.rollout.maxUnavailable }}
  selector:
    matchLabels:
      app: norviq-api
  template:
    metadata:
      labels:
        app: norviq-api
    spec:
      {{- include "norviq.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.api.spread.enabled }}
      {{- include "norviq.spread" (dict "app" "norviq-api") | nindent 6 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh','-c','until nc -z norviq-postgresql 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh','-c','until nc -z norviq-redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: api
          image: "{{ .Values.images.registry }}{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          {{- include "norviq.preStop" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - secretRef:
                name: norviq-secrets
            - configMapRef:
                name: norviq-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30          # up to 150s for migrations + warm_cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
{{- if .Values.opa.enabled }}
        # Long-lived OPA policy engine (per-replica sidecar). The API queries it at localhost:8181.
        - name: opa
          image: "{{ .Values.opa.image }}"
          args:
            - "run"
            - "--server"
            - "--v0-compatible"
            - "--addr=0.0.0.0:{{ .Values.opa.port }}"
            - "--log-level=error"
          ports:
            - containerPort: {{ .Values.opa.port }}
              name: opa
          livenessProbe:
            httpGet:
              path: /health
              port: opa
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: opa
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.opa.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
