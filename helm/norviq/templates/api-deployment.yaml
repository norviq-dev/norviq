apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-api
  namespace: {{ .Values.namespace }}
  labels:
    app: norviq-api
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0            # node is at ~97% CPU requests — a surge pod cannot schedule
      maxUnavailable: 1      # terminate old first, then create new (replace-in-place)
  selector:
    matchLabels:
      app: norviq-api
  template:
    metadata:
      labels:
        app: norviq-api
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh','-c','until nc -z norviq-postgresql 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh','-c','until nc -z norviq-redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - secretRef:
                name: norviq-secrets
            - configMapRef:
                name: norviq-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30          # up to 150s for migrations + warm_cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
