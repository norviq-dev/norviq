apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: norviq-api
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  {{- /* When the HPA owns the replica count, the Deployment must NOT also set `replicas` — otherwise every
         reconcile resets it and fights the autoscaler (scale-up flapping). Omit it when autoscaling is on. */}}
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.api.rollout.maxSurge }}
      maxUnavailable: {{ .Values.api.rollout.maxUnavailable }}
  selector:
    matchLabels:
      app: norviq-api
  template:
    metadata:
      annotations:
        # Roll the pods when the ConfigMap/Secret they consume by name (envFrom) changes — K8s does
        # not do this on its own for name-referenced config, so config/secret edits would otherwise
        # not take effect until an unrelated pod restart.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app: norviq-api
        {{- include "norviq.componentLabels" (dict "root" $ "component" "api") | nindent 8 }}
        {{- if .Values.config.spiffeCsi.enabled }}
        norviq.io/svid: "true"        # opt-in to a SPIRE SVID (ClusterSPIFFEID podSelector)
        {{- end }}
    spec:
      {{- include "norviq.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.config.spiffeCsi.enabled }}
      serviceAccountName: norviq-api  # self-describing SVID: spiffe://norviq/ns/<ns>/sa/norviq-api
      {{- end }}
      {{- if .Values.api.spread.enabled }}
      {{- include "norviq.spread" (dict "app" "norviq-api") | nindent 6 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        {{- include "norviq.waitFor" (dict "name" "wait-for-postgres" "host" "norviq-postgresql" "port" 5432) | nindent 8 }}
        {{- include "norviq.waitFor" (dict "name" "wait-for-redis" "host" "norviq-redis" "port" 6379) | nindent 8 }}
      containers:
        - name: api
          image: "{{ include "norviq.image" (dict "root" $ "component" .Values.images.api) }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          {{- /* Hardened securityContext on the PRIMARY container (set inline rather than relying
                 on an external PSA/Kyverno mutation that need not exist). The api image runs as USER norviq
                 (non-root). readOnlyRootFilesystem is intentionally NOT forced on the Python app container
                 (it writes tmp at runtime); the CIS-critical controls (non-root, no priv-esc, drop ALL caps,
                 seccomp RuntimeDefault) are applied. */}}
          {{- if .Values.securityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
            seccompProfile:
              {{- toYaml .Values.securityContext.seccompProfile | nindent 14 }}
          {{- end }}
          {{- include "norviq.preStop" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - secretRef:
                name: norviq-secrets
            - configMapRef:
                name: norviq-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30          # up to 150s for migrations + warm_cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.config.spiffeCsi.enabled }}
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
          {{- end }}
{{- if .Values.opa.enabled }}
        # Long-lived OPA policy engine (per-replica sidecar). The API queries it at localhost:8181.
        # NOTE (engine lockdown): `opa run --server` has NO `--capabilities` flag (only `opa
        # build`/`opa check`/`opa eval` accept one — verified against the pinned opa.image version above), so
        # a locked-down builtin set cannot be handed to this long-lived server directly. The real control is
        # norviq/engine/opa_client.py::_check_capabilities, which independently re-compiles every pushed rego
        # with `opa check --capabilities=<the same file>` (baked into the api/engine image) BEFORE it ever
        # reaches this server — see helm/norviq/files/opa-capabilities.json / scripts/gen-opa-capabilities.py.
        - name: opa
          image: "{{ include "norviq.thirdPartyImage" (dict "root" $ "image" .Values.opa.image) }}"
          args:
            - "run"
            - "--server"
            - "--v0-compatible"
            # Bind LOOPBACK ONLY. OPA's admin API (/v1/policies) is unauthenticated by default and is
            # read-WRITE: anything that can reach it can rewrite or delete the enforcement policy, i.e.
            # disable the PDP. It is a same-pod sidecar and the app reaches it via NRVQ_OPA_URL
            # (http://localhost:<port>), so 0.0.0.0 bought nothing and exposed the decision point to
            # every pod on the cluster network. Do NOT change this back without adding OPA authn/authz.
            - "--addr=127.0.0.1:{{ .Values.opa.port }}"
            - "--log-level=error"
          ports:
            - containerPort: {{ .Values.opa.port }}
              name: opa
          # NO kubelet probes on this container — deliberate, and load-bearing.
          # A kubelet httpGet/tcpSocket probe dials the POD IP, never loopback, so any probe here would
          # be refused the moment OPA binds 127.0.0.1 and would hold the whole pod NotReady forever.
          # An exec probe is not an option either: openpolicyagent/opa:*-static is distroless (no shell).
          # OPA's health is still gated, and more meaningfully: the api container's own /readyz calls
          # evaluator.opa.health() over localhost and ANDs it into readiness (norviq/api/routers/health.py),
          # so a dead OPA still takes this replica out of the Service endpoints — and it proves the real
          # consumer can reach OPA, which a kubelet probe never did.
          # Trade-off accepted: a wedged-but-listening OPA is not auto-restarted; it is drained instead.
          resources:
            {{- toYaml .Values.opa.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
{{- if .Values.config.internalTls.enabled }}
        # Auto-mTLS terminator: serves TLS (+optional client-cert mTLS) on :8443 and proxies to the app
        # on loopback. The app itself stays HTTP (probes/tests unaffected); nothing is plaintext on the wire.
        - name: tls-proxy
          image: {{ include "norviq.thirdPartyImage" (dict "root" $ "image" (.Values.config.internalTls.proxyImage | default "nginx:1.27-alpine")) | quote }}
          command: ["nginx", "-c", "/etc/nginx/nginx.conf", "-g", "daemon off;"]
          ports:
            - containerPort: 8443
              name: https
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: api-tls
              mountPath: /etc/norviq/tls
              readOnly: true
            - name: api-tls-proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            {{- toYaml .Values.config.internalTls.proxyResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
      {{- if or .Values.config.spiffeCsi.enabled .Values.config.internalTls.enabled }}
      volumes:
        {{- if .Values.config.spiffeCsi.enabled }}
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        {{- end }}
        {{- if .Values.config.internalTls.enabled }}
        - name: api-tls
          secret:
            secretName: norviq-api-tls
        - name: api-tls-proxy-config
          configMap:
            name: norviq-api-tls-proxy
        {{- end }}
      {{- end }}
