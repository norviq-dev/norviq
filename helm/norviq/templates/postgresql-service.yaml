{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: norviq-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: norviq-postgresql
    {{- include "norviq.componentLabels" (dict "root" $ "component" "postgresql") | nindent 4 }}
spec:
  selector:
    app: norviq-postgresql
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgres
      name: postgres
  clusterIP: None
{{- end }}
