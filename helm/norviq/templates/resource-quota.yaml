{{- /*
  Optional per-tenant NrvqPolicy quota. Opt-in: only namespaces listed in `policyQuotaNamespaces`
  get a ResourceQuota, and each MUST already exist (a ResourceQuota is namespaced). Empty by default
  so a fresh install never fails on a namespace that hasn't been created yet — add tenant namespaces
  here (via `helm upgrade`) once they exist.
*/ -}}
{{- range $ns := .Values.policyQuotaNamespaces }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: norviq-crd-quota
  namespace: {{ $ns }}
  labels:
    {{- include "norviq.labels" $ | nindent 4 }}
spec:
  hard:
    count/nrvqpolicies.norviq.io: "100"
---
{{- end }}
# NrvqClass and NrvqConfig are cluster-scoped — limited by RBAC, not ResourceQuota.
