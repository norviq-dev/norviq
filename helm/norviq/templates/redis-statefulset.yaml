{{- if and .Values.redis.enabled (not .Values.redis.ha.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: norviq-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: norviq-redis
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  serviceName: norviq-redis
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      app: norviq-redis
  template:
    metadata:
      labels:
        app: norviq-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          # Partial hardening only. These bundled single-node datastores are a dev convenience —
          # values-prod.yaml replaces them with the operator-managed HA variants (asserted by
          # test_prod_profile_drops_the_unhardened_bundled_datastores). runAsNonRoot / drop-ALL are
          # deliberately NOT set: the official postgres/redis entrypoints start as root to chown the
          # data dir and then drop privileges, so forcing them breaks startup. These two controls are
          # free and do not.
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.redis.port }}
              name: redis
          command: ["redis-server", "--requirepass", "{{ .Values.redis.password }}"]
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: norviq-redis-pvc
{{- end }}
