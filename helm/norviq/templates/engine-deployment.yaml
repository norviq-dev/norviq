apiVersion: apps/v1
kind: Deployment
metadata:
  name: norviq-engine
  namespace: {{ .Release.Namespace }}
  labels:
    app: norviq-engine
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  {{- /* When the HPA owns the replica count, the Deployment must NOT also set `replicas` — otherwise
         every reconcile resets it and fights the autoscaler (scale-up flapping). Omit it when
         autoscaling is on, matching api/webhook. */}}
  {{- if not .Values.engine.autoscaling.enabled }}
  replicas: {{ .Values.engine.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.engine.rollout.maxSurge }}
      maxUnavailable: {{ .Values.engine.rollout.maxUnavailable }}
  selector:
    matchLabels:
      app: norviq-engine
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app: norviq-engine
        {{- include "norviq.componentLabels" (dict "root" $ "component" "engine") | nindent 8 }}
        {{- if .Values.config.spiffeCsi.enabled }}
        norviq.io/svid: "true"        # opt-in to a SPIRE SVID (ClusterSPIFFEID podSelector)
        {{- end }}
    spec:
      {{- include "norviq.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.config.spiffeCsi.enabled }}
      serviceAccountName: norviq-engine
      {{- end }}
      {{- if .Values.engine.spread.enabled }}
      {{- include "norviq.spread" (dict "app" "norviq-engine") | nindent 6 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        {{- include "norviq.waitFor" (dict "name" "wait-for-postgres" "host" "norviq-postgresql" "port" 5432) | nindent 8 }}
        {{- include "norviq.waitFor" (dict "name" "wait-for-redis" "host" "norviq-redis" "port" 6379) | nindent 8 }}
      containers:
        - name: engine
          image: "{{ include "norviq.image" (dict "root" $ "component" .Values.images.engine) }}"
          imagePullPolicy: {{ .Values.images.engine.pullPolicy }}
          {{- /* Hardened securityContext on the primary container (image runs as USER norviq).
                 readOnlyRootFilesystem is not forced on the Python app; the CIS-critical controls are. */}}
          {{- if .Values.securityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
            seccompProfile:
              {{- toYaml .Values.securityContext.seccompProfile | nindent 14 }}
          {{- end }}
          {{- include "norviq.preStop" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.engine.port }}
              name: http
          env:
            # Run the EMBEDDED evaluator, not the default thin proxy.
            # settings.sidecar_mode defaults to "proxy", which makes this workload forward every decision
            # to the central API — but nothing ever gives this Deployment an NRVQ_API_TOKEN (only the
            # webhook mints one, for the pods it injects), so the central API answered 401 and the
            # RemoteEvaluator failed CLOSED on every call, including benign ones. That is an outage
            # wearing enforcement's clothes: it looks like blocking, but no policy is consulted.
            # This workload is built for embedded evaluation — it carries its own OPA sidecar and waits
            # for Postgres AND Redis, none of which a thin proxy uses.
            - name: NRVQ_SIDECAR_MODE
              value: "embedded"
          envFrom:
            - secretRef:
                name: norviq-secrets
            - configMapRef:
                name: norviq-config
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              # /readyz, NOT /healthz: /healthz is a liveness-shaped constant, while /readyz asserts the
              # PDP is actually reachable over localhost (http_fallback.py). That gating is load-bearing
              # here because the OPA sidecar binds loopback and therefore CANNOT be probed by the kubelet
              # directly — this is the only place OPA health reaches readiness for this workload.
              # Liveness deliberately stays on /healthz: an OPA outage should DRAIN this replica, not
              # restart-loop the engine.
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.config.spiffeCsi.enabled }}
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
          {{- end }}
{{- if .Values.opa.enabled }}
        # Long-lived OPA policy engine (per-replica sidecar). The engine queries it at localhost:8181.
        # NOTE (engine lockdown): `opa run --server` has NO `--capabilities` flag (only `opa
        # build`/`opa check`/`opa eval` accept one — verified against the pinned opa.image version above), so
        # a locked-down builtin set cannot be handed to this long-lived server directly. The real control is
        # norviq/engine/opa_client.py::_check_capabilities, which independently re-compiles every pushed rego
        # with `opa check --capabilities=<the same file>` (baked into the api/engine image) BEFORE it ever
        # reaches this server — see helm/norviq/files/opa-capabilities.json / scripts/gen-opa-capabilities.py.
        - name: opa
          image: "{{ .Values.opa.image }}"
          args:
            - "run"
            - "--server"
            - "--v0-compatible"
            # Bind LOOPBACK ONLY — see the identical note in api-deployment.yaml. OPA's unauthenticated
            # read-WRITE admin API must never be reachable from another pod.
            - "--addr=127.0.0.1:{{ .Values.opa.port }}"
            - "--log-level=error"
          ports:
            - containerPort: {{ .Values.opa.port }}
              name: opa
          # NO kubelet probes — see the identical note in api-deployment.yaml. A kubelet probe dials the
          # POD IP, so it cannot reach a loopback-bound OPA and would pin this pod NotReady forever; the
          # engine's own readiness asserts OPA health over localhost instead.
          resources:
            {{- toYaml .Values.opa.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
      {{- if .Values.config.spiffeCsi.enabled }}
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
      {{- end }}
