{{- if and .Values.webhook.enabled .Values.webhook.validating.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: norviq-policy-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Values.namespace }}/norviq-webhook-tls"
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
webhooks:
  - name: nrvqpolicies.norviq.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups: ["norviq.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nrvqpolicies"]
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: norviq-webhook
        path: /validate-policy
        port: 443
{{- end }}
