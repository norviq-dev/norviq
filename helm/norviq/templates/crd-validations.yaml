{{- if .Values.validatingAdmissionPolicyEnabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: norviq-policy-guards
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["norviq.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["nrvqpolicies"]
  validations:
    - expression: "has(object.spec.target) && (has(object.spec.target.agentClass) || has(object.spec.target.namespace) || (has(object.spec.target.kind) && has(object.spec.target.name)))"
      message: "target must set agentClass, namespace, or both kind and name"
    - expression: "!has(object.spec.target.namespace) || object.spec.target.namespace == object.metadata.namespace || (object.metadata.namespace == '{{ .Values.namespace }}' && (has(object.spec.clusterPriority) || has(object.spec.target.agentClass) || (has(object.spec.target.kind) && has(object.spec.target.name))))"
      message: "cross-namespace targeting is only allowed for admin policies with clusterPriority or scoped workload/agentClass target"
    - expression: "!has(object.spec.clusterPriority) || (object.metadata.namespace == '{{ .Values.namespace }}' && object.spec.clusterPriority >= 500 && object.spec.clusterPriority <= 1000)"
      message: "clusterPriority is only allowed in namespace {{ .Values.namespace }} with range 500-1000"
    - expression: "!has(object.spec.clusterPriority) || request.userInfo.groups.exists(g, g == 'system:masters')"
      message: "clusterPriority requires cluster-admin privileges"
    - expression: "object.metadata.namespace == '{{ .Values.namespace }}' || (has(namespaceObject) && has(namespaceObject.metadata) && has(namespaceObject.metadata.labels) && has(namespaceObject.metadata.labels['norviq.io/policy-quota']) && namespaceObject.metadata.labels['norviq.io/policy-quota'] == 'enabled')"
      message: "NrvqPolicy is only allowed in namespaces labeled norviq.io/policy-quota=enabled (or in {{ .Values.namespace }})"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: norviq-policy-guards-binding
  labels:
    {{- include "norviq.labels" . | nindent 4 }}
spec:
  policyName: norviq-policy-guards
  validationActions: [Deny]
{{- end }}
