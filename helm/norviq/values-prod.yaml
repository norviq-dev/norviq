# Multi-node PROD overlay. Turns on the HA/autoscaling/spread posture that is gated-off in the
# single-node dev defaults. NOT live-validated on the 1-node dev cluster — template-validated via
# `helm template -f values-prod.yaml`. See docs/engineering/prod-deploy-runbook.md.
#
# Prereqs on the target cluster: >=3 nodes; metrics-server (HPA); CloudNativePG operator (PG HA);
# a Redis HA operator (RedisFailover CRD) — or swap redis-ha.yaml for your stack.

# Public/managed registry recommended for prod (GHCR has no Docker Hub anonymous pull-rate limit at
# scale). Drop-in: set registry + repository, or point at your ACR. Empty imagePullSecrets = public.
images:
  registry: "ghcr.io/norviq-dev/"   # public default (copy-paste-clean). Override with your mirror, e.g. "<acct>.azurecr.io/" + repository, for supply-chain control.
  api: { pullPolicy: IfNotPresent }
  engine: { pullPolicy: IfNotPresent }
  ui: { pullPolicy: IfNotPresent }
  webhook: { pullPolicy: IfNotPresent }
imagePullSecrets: []        # public registry -> no pull secret (or set your GHCR/ACR secret)

# Scaling model: set a MINIMUM that gives HA (survive one pod/node loss) and let the HPA grow each
# component toward its maximum on CPU/memory load — the pod count tracks traffic, not a hardcoded
# number. Combine with cluster-autoscaler on the node pool so NODES grow to hold the pods (see
# docs/engineering/deploy-runbook.md). `replicas` here is only the fallback for autoscaling.enabled=false.
api:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 2
  autoscaling:
    enabled: true
    minReplicas: 2          # HA floor — fits a modest cluster; scales up on load, not pinned high
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75   # also scale on memory (large policy sets / audit bursts)
  spread:
    enabled: true           # podAntiAffinity + topologySpread across nodes
  rollout:
    maxSurge: 1             # surge for zero-downtime (multi-node has headroom)
    maxUnavailable: 0
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

engine:
  replicas: 2               # fallback only; the HPA below owns the count in prod
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true           # the standalone engine is on the enforcement hot path — scale it too
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  spread:
    enabled: true

webhook:
  replicas: 2
  injection:
    enabled: true
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
  spread:
    enabled: true

opa:
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

# HA datastores via operators (operators must be pre-installed). The single StatefulSets are
# auto-disabled when ha.enabled, and the API connection URLs retarget the HA services.
postgresql:
  ha:
    enabled: true
    instances: 3
  storage: 20Gi
  # Do NOT ship the well-known default DB password in a prod overlay. Blank here so the operator
  # MUST supply a strong credential (--set postgresql.password=... or a sealed secret); with
  # config.requireStrongSecret an install left empty fails loudly at render (secret.yaml gate).
  password: ""
redis:
  ha:
    enabled: true
    replicas: 3
  # Same for the cache credential — no shipped default in prod; the operator supplies a strong one.
  password: ""

config:
  requireStrongSecret: true
  dbSslMode: require        # managed/HA Postgres should enforce TLS

gracefulShutdown:
  preStopSleepSeconds: 5

# Fleet plane prod-readiness. STILL gated by fleet.hub.enabled / fleet.enabled (so a
# values-prod install WITHOUT fleet renders zero fleet resources). When the hub is enabled on a prod
# cluster, these turn on HA: >=2 fleet-api replicas + PDB + HPA + spread, and CloudNativePG fleet store.
fleet:
  hub:
    replicas: 3
    pdb:
      enabled: true
      minAvailable: 2
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 6
    spread:
      enabled: true
    postgresql:
      ha:
        enabled: true
        instances: 3
      # HIGH: do NOT ship the well-known default fleet DB password in a prod overlay. Blank here so the
      # operator MUST supply a strong credential (--set fleet.hub.postgresql.password=... or a sealed secret);
      # config.requireStrongSecret makes an install with the empty/default value fail loudly (fleet-hub.yaml).
      password: ""
    # When HA postgres is on, point the hub at the CNPG read-write service. Blank by default so the shipped
    # default password never leaks into the fleet-config; the operator supplies the full URL (with the strong
    # credential above) at install time, e.g.:
    #   --set fleet.hub.pgUrl="postgresql://norviq:<STRONG>@fleet-postgresql-ha-rw:5432/norviq_fleet"
    pgUrl: ""
