# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s
        ports: [6379:6379]
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: norviq
          POSTGRES_PASSWORD: norviq_dev
          POSTGRES_DB: norviq
        options: --health-cmd pg_isready --health-interval 10s
        ports: [5432:5432]
    env:
      NRVQ_REDIS_URL: redis://localhost:6379
      NRVQ_PG_URL: postgresql://norviq:norviq_dev@localhost:5432/norviq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Webhook go vet
        run: |
          cd webhook
          go vet ./...
      - name: Webhook race tests
        run: |
          cd webhook
          go test -race ./...
      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit bandit ruff
      - name: Lint
        run: ruff check norviq/ tests/
      - name: Test
        run: pytest tests/ -v --tb=short
      - name: Security scan
        run: |
          pip-audit --skip-editable
          bandit -r norviq/ -q -ll
      - name: Build UI
        run: |
          cd ui && npm ci && npm run build
      - name: Validate Helm chart
        run: |
          helm lint helm/norviq/
          helm template norviq helm/norviq/ -f helm/norviq/values-dev.yaml > /tmp/rendered.yaml
          kubeconform -strict -summary -skip CustomResourceDefinition /tmp/rendered.yaml
