name: CI

on:
  push:
    branches: [main, 'day*-*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: norviq
          POSTGRES_PASSWORD: norviq_ci
          POSTGRES_DB: norviq
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U norviq"
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install OPA
        run: |
          curl -L -o /tmp/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /tmp/opa
          sudo mv /tmp/opa /usr/local/bin/opa
      - run: pip install -r requirements.txt
      - name: Backend tests
        env:
          NRVQ_DB_URL: postgresql+asyncpg://norviq:norviq_ci@127.0.0.1:5432/norviq
          NRVQ_DB_SSL_MODE: disable
          NRVQ_REDIS_URL: redis://127.0.0.1:6379/0
          NRVQ_JWT_SECRET: ci-test-secret
        run: pytest tests/engine/ tests/integration/ -v
      - name: Attack regression
        env:
          NRVQ_API_URL: http://127.0.0.1:8080
          NRVQ_JWT_SECRET: ci-test-secret
          NRVQ_DB_URL: postgresql+asyncpg://norviq:norviq_ci@127.0.0.1:5432/norviq
          NRVQ_DB_SSL_MODE: disable
          NRVQ_REDIS_URL: redis://127.0.0.1:6379/0
          NRVQ_OTEL_DISABLED: "true"
        run: |
          python scripts/seed-local-policies.py 2>&1 || echo "seed warning"
          uvicorn norviq.api.main:app --host 127.0.0.1 --port 8080 &
          sleep 10
          curl http://127.0.0.1:8080/healthz
          export NRVQ_API_TOKEN=$(python -c "from jose import jwt; print(jwt.encode({'sub':'admin','role':'admin'}, 'ci-test-secret', algorithm='HS256'))")
          pytest tests/attacks/ -v --tb=line
      - name: UI tests + build
        working-directory: ui
        run: |
          npm ci
          npm run test:run
          npm run build
