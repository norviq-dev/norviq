# SPDX-License-Identifier: Apache-2.0
# FOSSA license-compliance + dependency-vulnerability scan.
# `fossa analyze` uploads the dependency graph to FOSSA; `fossa test` FAILS the job on any
# license-policy violation or known dependency vulnerability — the "clear scan" gate. Requires the
# repo secret FOSSA_API_KEY (created from a FOSSA push-only API token; project imported at app.fossa.com).
#
# The gate fails on dependency VULNERABILITY/MALWARE issues only (see the security-gate step). License
# issues are scanned + uploaded (visible in the FOSSA UI) but not gated here — the free tier can't tune
# the license policy, and the only hits are documented false positives (copyleft data in permissive deps).
name: FOSSA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

jobs:
  fossa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Installs the fossa CLI and runs `fossa analyze` (upload only; we run `fossa test` ourselves below
      # so we can capture its JSON regardless of exit code). SHA-pinned (v1.7.0 tag dereferenced via
      # `gh api repos/fossas/fossa-action/git/ref/tags/v1.7.0` -> annotated tag object -> commit).
      - uses: fossas/fossa-action@3ebcea1862c6ffbd5cf1b4d0bd6b3fe7bd6f2cac # v1.7.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: false
      - name: Dump FOSSA issues + attribution (JSON) for triage
        if: always()
        run: |
          set +e
          fossa test --format json > fossa-issues.json 2>fossa-test.err
          echo "fossa test exit: $?"
          fossa report attribution --format json > fossa-attribution.json 2>/dev/null
          echo "issues bytes:      $(wc -c < fossa-issues.json 2>/dev/null || echo 0)"
          echo "attribution bytes: $(wc -c < fossa-attribution.json 2>/dev/null || echo 0)"
          # A compact human-readable summary straight into the job log too:
          echo '===== ISSUE TYPE COUNTS ====='
          python3 - <<'PY' 2>/dev/null || true
          import json,collections
          try:
              d=json.load(open('fossa-issues.json'))
          except Exception as e:
              print('could not parse issues json:', e); raise SystemExit
          issues=d.get('issues') or d.get('Issues') or (d if isinstance(d,list) else [])
          c=collections.Counter()
          for i in issues:
              c[i.get('type') or i.get('Type') or 'unknown']+=1
          for k,v in c.most_common(): print(f'{v:4}  {k}')
          PY
      - name: Upload FOSSA report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fossa-report
          path: |
            fossa-issues.json
            fossa-attribution.json
            fossa-test.err
          if-no-files-found: warn
      # Security gate: FAIL on dependency VULNERABILITY or MALWARE issues only. License-policy issues are
      # NOT gated here — the FOSSA free tier can't tune the license policy (CC-BY-SA/APSL flag only on
      # bundled data in permissive-code deps — documented false positives), so gating on them would block
      # CI on things we can't fix. Trivy (build.yml) covers OS/image CVEs; this covers dependency-graph CVEs.
      - name: FOSSA security gate (fail on dependency vuln/malware)
        if: always()
        run: |
          python3 - <<'PY'
          import json, sys
          # Documented, accepted dependency exceptions. Each is an UNFIXABLE-by-version-bump CVE in an
          # OPTIONAL SDK framework-adapter extra that is NOT part of the shipped container images (the
          # images install only `.[spiffe]`; these deps arrive solely via norviq[frameworks] / [crewai] /
          # [semantic-kernel], which a deployment must opt into). Full rationale + review dates live in
          # SECURITY.md ("Accepted dependency exceptions"). Keep this list in lockstep with that table:
          # a CVE that a bump CAN fix must be bumped (see werkzeug>=3.1.6 in pyproject), never listed here.
          ACCEPTED_CVES = {
              "CVE-2026-45829",  # chromadb (via crewai): Python-SERVER pre-auth RCE; no fixed release exists
                                 #   (latest still affected); crewai uses chromadb as an embedded client, not
                                 #   an exposed server, so the pre-auth server path is not reachable here.
              "CVE-2026-26030",  # semantic-kernel: InMemoryVectorStore filter-lambda RCE; the fix (1.39.4+)
                                 #   requires a PRE-RELEASE azure-ai-agents dep, and the vulnerable vector-store
                                 #   path is not used by the norviq semantic-kernel adapter.
              "CVE-2026-25592",  # semantic-kernel: a .NET CVE (fix = .NET Core 1.71.0) that FOSSA maps onto
                                 #   the pip package; no Python semantic-kernel release clears it.
          }
          d = json.load(open("fossa-issues.json"))
          sec = [i for i in d.get("issues", []) if i.get("type") in ("vulnerability", "malware")]
          def accepted_cve(i):
              blob = json.dumps(i)
              return next((c for c in ACCEPTED_CVES if c in blob), None)
          accepted = [i for i in sec if accepted_cve(i)]
          gated    = [i for i in sec if not accepted_cve(i)]
          if accepted:
              print(f"NOTE: {len(accepted)} accepted dependency exception(s) (documented in SECURITY.md):")
              for i in accepted:
                  print(f"  - {accepted_cve(i)}: {i.get('revisionId','')}")
          if gated:
              print(f"FOSSA security gate FAILED — {len(gated)} dependency vuln/malware issue(s):")
              for i in gated:
                  print(f"  - {i.get('type')}: {i.get('revisionId','')} {i.get('cve') or ''}")
              sys.exit(1)
          print(f"FOSSA security gate PASSED — 0 non-excepted dependency vuln/malware issues "
                f"({len(accepted)} documented exception(s); license/outdated are informational).")
          PY
