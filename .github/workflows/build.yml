# SPDX-License-Identifier: Apache-2.0
name: Build & Push

on:
  push:
    branches: [main]
    paths:                       # only rebuild images when something that ships in one changes
      - 'norviq/**'
      - 'ui/**'
      - 'webhook/**'
      - 'policies/**'
      - 'Dockerfile*'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  # GHCR — public images under the org, pushed with the built-in GITHUB_TOKEN (no external secrets).
  REPOSITORY: ghcr.io/norviq-dev/norviq-engine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: engine
            dockerfile: Dockerfile.engine
            context: .
          - component: api
            dockerfile: Dockerfile.api
            context: .
          - component: ui
            dockerfile: Dockerfile.ui
            context: .
          - component: webhook
            dockerfile: Dockerfile
            context: webhook
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          build-args: |
            NRVQ_GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.REPOSITORY }}:${{ matrix.component }}-${{ github.sha }}
            ${{ env.REPOSITORY }}:${{ matrix.component }}-latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      # Trivy IMAGE scan of the just-pushed image.
      # (Image scanning lives HERE, not in security.yml: images only exist after this build.)
      # FAIL-CLOSED (exit-code "1"): NEW fixable HIGH/CRITICAL vulns block the build. Accepted
      # findings get triaged into .trivyignore WITH a rationale recorded in
      # docs/engineering/security-baseline.md — ignore-unfixed stays true so only actionable
      # (patch-available) vulns gate.
      - name: trivy image scan (${{ matrix.component }}) — fail-closed
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REPOSITORY }}:${{ matrix.component }}-${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
