# SPDX-License-Identifier: Apache-2.0
name: Build & Push

on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REPOSITORY: sanman97/norviq-engine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: engine
            dockerfile: Dockerfile.engine
            context: .
          - component: api
            dockerfile: Dockerfile.api
            context: .
          - component: ui
            dockerfile: Dockerfile.ui
            context: .
          - component: webhook
            dockerfile: Dockerfile
            context: webhook
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: webhook/go.mod
      - name: Verify CRD sync
        run: |
          chmod +x scripts/sync-crds.sh
          ./scripts/sync-crds.sh
          git diff --exit-code crds helm/norviq/crds
      - name: Run webhook tests
        working-directory: webhook
        run: go test ./...
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Render Helm chart
        run: helm template norviq ./helm/norviq > /tmp/norviq-rendered.yaml
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
      - name: Validate CRDs and examples with kubeconform
        run: |
          kubeconform -strict -summary -skip CustomResourceDefinition helm/norviq/templates/*.yaml
          kubeconform -strict -summary crds/examples/*.yaml
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REPOSITORY }}:${{ matrix.component }}-${{ github.sha }}
            ${{ env.REPOSITORY }}:${{ matrix.component }}-latest
