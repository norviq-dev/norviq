# SPDX-License-Identifier: Apache-2.0
name: Build & Push

on:
  push:
    branches: [main]
    paths:                       # only rebuild images when something that ships in one changes
      - 'norviq/**'
      - 'ui/**'
      - 'webhook/**'
      - 'policies/**'
      - 'Dockerfile*'
      - 'pyproject.toml'
      - '.trivyignore'                 # the image-scan gate baseline — re-run the scan when it changes
      - '.github/workflows/build.yml'
  workflow_dispatch:
  # Reusable entry point. release.yml calls this on a v*.*.* tag and then gates its chart job on
  # `needs:` — which is ONLY expressible between jobs of a single workflow run, so a called workflow
  # is the one way to guarantee the version-tagged images exist BEFORE the chart that pins them is
  # published. Without that ordering the chart would reference images that do not exist yet.
  workflow_call:
    inputs:
      version:
        description: "Release version WITHOUT the leading v (e.g. 0.1.0). Empty = ordinary main build."
        type: string
        required: false
        default: ""

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  # GHCR — public images under the org, pushed with the built-in GITHUB_TOKEN (no external secrets).
  REPOSITORY: ghcr.io/norviq-dev/norviq-engine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35        # arm64 is built under QEMU emulation — slower than a native amd64-only build
    permissions:
      contents: read
      packages: write
      id-token: write          # keyless cosign signing of the image digest (Sigstore OIDC)
    strategy:
      matrix:
        include:
          - component: engine
            dockerfile: Dockerfile.engine
            context: .
          - component: api
            dockerfile: Dockerfile.api
            context: .
          - component: ui
            dockerfile: Dockerfile.ui
            context: .
          - component: webhook
            dockerfile: Dockerfile
            context: webhook
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # QEMU registers arm64 emulation so buildx can build the linux/arm64 variant on the amd64
      # runner. (The Go webhook cross-compiles natively via TARGETARCH and skips emulation; the
      # Python/UI images build under emulation, installing prebuilt aarch64 wheels/apk packages.)
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          # Keep the pushed index to exactly the two OS/arch images — no extra unknown/unknown
          # attestation manifest, which some kubelets/tools misread as a missing platform match.
          # Provenance/SBOM are therefore attached OUT-OF-BAND with cosign below (separate
          # `sha256-<digest>.sig`/`.sbom` registry tags), which leaves the image index untouched.
          provenance: false
          build-args: |
            NRVQ_GIT_SHA=${{ github.sha }}
          # Exactly two tags in either mode. A RELEASE build (version set) publishes the immutable
          # `<component>-<version>` that the released chart pins, and deliberately does NOT move
          # `-latest`: tagging an older commit would otherwise drag `latest` backwards for everyone.
          tags: |
            ${{ env.REPOSITORY }}:${{ matrix.component }}-${{ github.sha }}
            ${{ inputs.version == '' && format('{0}:{1}-latest', env.REPOSITORY, matrix.component) || format('{0}:{1}-{2}', env.REPOSITORY, matrix.component, inputs.version) }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      # Trivy IMAGE scan of the just-pushed image.
      # (Image scanning lives HERE, not in security.yml: images only exist after this build.)
      # Trivy resolves the multi-arch index to the runner's platform (amd64) and scans that variant;
      # the arm64 variant ships identical OS/pip package versions, so the amd64 scan is representative.
      # FAIL-CLOSED (exit-code "1"): NEW fixable HIGH/CRITICAL vulns block the build. Accepted
      # findings get triaged into .trivyignore WITH a rationale recorded in
      # docs/engineering/security-baseline.md — ignore-unfixed stays true so only actionable
      # (patch-available) vulns gate.
      - name: trivy image scan (${{ matrix.component }}) — fail-closed
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          # Scan BY DIGEST, not by tag: the digest is exactly what was just built and what gets
          # signed and pinned, so the scan cannot race a concurrent push that moves the tag.
          image-ref: ${{ env.REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"

      # Supply chain: bind this exact digest to this repo+workflow identity, and publish an SBOM.
      # Runs only AFTER the fail-closed Trivy gate, so a vulnerable image is never signed.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # Both cosign steps below RETRY. Keyless signing needs two external services on every call:
      # GitHub's ambient OIDC token endpoint, and Sigstore (Fulcio/Rekor). Those fail transiently —
      # observed repeatedly as `fetching ambient OIDC credentials: invalid character 'u' looking for
      # beginning of value`, i.e. a non-JSON "unauthorized" body from the token endpoint, hitting
      # exactly one of the four parallel matrix jobs per run (all four request a token at once).
      # A blip there says nothing about the image, but without a retry it red-lights main and can
      # break a GA release, since release.yml calls this workflow on the version tag.
      # Still FAIL-CLOSED: if every attempt fails we exit 1 and publish nothing, so a genuine
      # identity/permission failure is never masked as a flake.
      - name: cosign sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if cosign sign "${{ env.REPOSITORY }}@${{ steps.build.outputs.digest }}"; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              delay=$(( attempt * 15 ))
              echo "::warning::cosign sign attempt ${attempt}/5 failed; retrying in ${delay}s"
              sleep "${delay}"
            fi
          done
          echo "::error::cosign sign failed after 5 attempts — refusing to publish an unsigned image"
          exit 1
      # Generate the SBOM with the same pinned action (the trivy CLI is not guaranteed to be on PATH
      # afterwards — trivy-action runs it in a container), then attest the file with cosign.
      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REPOSITORY }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output: sbom-${{ matrix.component }}.json
      - name: Attest the SBOM to the image digest
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          test -s "sbom-${{ matrix.component }}.json"   # fail loudly rather than attest an empty file
          for attempt in 1 2 3 4 5; do
            if cosign attest --predicate "sbom-${{ matrix.component }}.json" --type spdxjson \
                 "${{ env.REPOSITORY }}@${{ steps.build.outputs.digest }}"; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              delay=$(( attempt * 15 ))
              echo "::warning::cosign attest attempt ${attempt}/5 failed; retrying in ${delay}s"
              sleep "${delay}"
            fi
          done
          echo "::error::cosign attest failed after 5 attempts — image is signed but has no SBOM attestation"
          exit 1
