# SPDX-License-Identifier: Apache-2.0
# Build the `norviq` sdist + wheel and publish to PyPI via Trusted Publishing (OIDC — no API token).
#
# DORMANT by design — this cannot release accidentally:
#   * The publish step runs ONLY on a pushed v*.*.* tag (workflow_dispatch builds + validates only).
#   * Trusted Publishing requires a matching "pending publisher" configured on PyPI first
#     (PyPI → your project/account → Publishing → add a GitHub publisher:
#      owner: norviq-dev, repo: norviq, workflow: pypi-publish.yml). Until that exists the publish
#      step fails WITHOUT uploading anything.
#
# To release once ready: configure the PyPI trusted publisher, then push a tag (e.g. `git tag v0.1.0
# && git push origin v0.1.0`). Consumers then: pip install "norviq[langchain]"
name: Publish to PyPI

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {} # build + `twine check` only — never publishes

jobs:
  pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing (no stored secret)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # Gate 0: the tag IS the version. PyPI will not let you re-upload 0.1.0 to correct a mistake,
      # so a tag that disagrees with pyproject.toml/Chart.yaml must stop the run before `build`.
      - name: Versions must agree with the tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            python3 scripts/check_release_versions.py "${GITHUB_REF_NAME#v}"
          else
            python3 scripts/check_release_versions.py
          fi

      - name: Build + validate the distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build                 # -> dist/*.whl + dist/*.tar.gz
          python -m twine check dist/*     # metadata/README render check before any upload

      # `twine check` validates metadata and that the README renders — it does NOT look inside the
      # wheel. Assert the package data the code loads at runtime is actually present, so a packaging
      # regression fails here rather than becoming an immutable upload.
      - name: The wheel must contain the runtime assets, not just .py files
        run: python3 scripts/check_wheel_contents.py dist
      - name: Publish to PyPI (Trusted Publishing) — tag pushes only
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
