apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: norviq-sidecar-injector
webhooks:
  - name: sidecar-injector.norviq.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    clientConfig:
      service:
        name: norviq-webhook
        namespace: norviq
        path: /mutate
      caBundle: 
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: norviq-injection
          operator: In
          values: ["enabled"]
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["kube-system", "kube-public", "kube-node-lease", "norviq"]
    failurePolicy: Ignore
    reinvocationPolicy: Never
    timeoutSeconds: 5
