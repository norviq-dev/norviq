<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 90px; flex: none; }
</style>
</head>
<body>
  <div class="row"><span class="tag">4xl / 40</span><span class="norviq-stat-hero">87</span></div>
  <div class="row"><span class="tag">3xl / 32</span><span class="norviq-stat">12,480</span></div>
  <div class="row"><span class="tag">2xl / 24</span><span class="norviq-h1">Security Command Center</span></div>
  <div class="row"><span class="tag">xl / 20</span><span class="norviq-h2">Tool Call Volume</span></div>
  <div class="row"><span class="tag">lg / 16</span><span class="norviq-card-title">Category Scores</span></div>
</body>
</html>
