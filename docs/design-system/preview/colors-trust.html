<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 22px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cell { border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-surface); overflow: hidden; }
  .pill-wrap { height: 78px; display: flex; align-items: center; justify-content: center; }
  .meta { padding: 8px 10px; border-top: 1px solid var(--border); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="pill-wrap"><span class="norviq-decision" style="color:#00e5a0;border-color:#00e5a040">high</span></div><div class="meta"><div class="name">Trust High</div><div class="hex">#00e5a0</div></div></div>
    <div class="cell"><div class="pill-wrap"><span class="norviq-decision" style="color:#ffb020;border-color:#ffb02040">medium</span></div><div class="meta"><div class="name">Trust Medium</div><div class="hex">#ffb020</div></div></div>
    <div class="cell"><div class="pill-wrap"><span class="norviq-decision" style="color:#ff3b5c;border-color:#ff3b5c40">low</span></div><div class="meta"><div class="name">Trust Low</div><div class="hex">#ff3b5c</div></div></div>
    <div class="cell"><div class="pill-wrap"><span class="norviq-decision" style="color:#4a5a78;border-color:#4a5a7840">frozen</span></div><div class="meta"><div class="name">Trust Frozen</div><div class="hex">#4a5a78</div></div></div>
  </div>
</body>
</html>
