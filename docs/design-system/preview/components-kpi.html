<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: radial-gradient(circle at top right,#122041 0%,var(--bg-void) 45%); padding: 22px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .kpi { padding: 16px 18px; }
  .lbl { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
  .val { font-size: 32px; font-weight: 600; color: var(--text-primary); letter-spacing: -.02em; font-variant-numeric: tabular-nums; margin-top: 10px; line-height: 1; }
  .trend { font-size: 11px; margin-top: 10px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel norviq-panel kpi" style="box-shadow:0 0 20px #3b7bf720">
      <div class="lbl">Total Calls 24h</div><div class="val">12,480</div>
      <div class="trend" style="color:#3b7bf7">↑12% vs yesterday</div>
    </div>
    <div class="panel norviq-panel kpi" style="box-shadow:0 0 20px #ff3b5c20">
      <div class="lbl">Blocked Today</div><div class="val">318</div>
      <div class="trend" style="color:#ff3b5c">↓8% false positives</div>
    </div>
  </div>
</body>
</html>
