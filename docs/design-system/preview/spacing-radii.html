<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .item { text-align: center; }
  .box { height: 64px; background: var(--bg-elevated); border: 1px solid var(--border-active); margin-bottom: 8px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="val">6px · pills</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="val">10px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">lg</div><div class="val">14px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="val">20px · feature</div></div>
  </div>
</body>
</html>
