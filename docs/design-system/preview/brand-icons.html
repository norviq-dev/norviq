<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; background: var(--bg-void); padding: 22px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 8px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-surface); }
  .item svg { color: var(--text-secondary); width: 22px; height: 22px; }
  .item.active svg { color: var(--accent); }
  .name { font-size: 11px; color: var(--text-primary); font-family: var(--font-sans); }
  .glyph { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item active"><i data-lucide="layout-dashboard"></i><span class="name">Dashboard</span><span class="glyph">layout-dashboard</span></div>
    <div class="item"><i data-lucide="clipboard-list"></i><span class="name">Policies</span><span class="glyph">clipboard-list</span></div>
    <div class="item"><i data-lucide="activity"></i><span class="name">Audit Log</span><span class="glyph">activity</span></div>
    <div class="item"><i data-lucide="bot"></i><span class="name">Agents</span><span class="glyph">bot</span></div>
    <div class="item"><i data-lucide="network"></i><span class="name">Threats</span><span class="glyph">network</span></div>
    <div class="item"><i data-lucide="settings"></i><span class="name">Settings</span><span class="glyph">settings</span></div>
    <div class="item"><i data-lucide="search"></i><span class="name">Search</span><span class="glyph">search</span></div>
    <div class="item"><i data-lucide="bell"></i><span class="name">Alerts</span><span class="glyph">bell</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
