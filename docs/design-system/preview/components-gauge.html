<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  body { margin: 0; background: radial-gradient(circle at top right,#122041 0%,var(--bg-void) 45%); padding: 18px; font-family: var(--font-sans); }
  .panel-demo { padding: 14px 18px; }
  .title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .gauge { height: 178px; position: relative; }
  .readout { text-align: center; margin-top: -82px; }
  .num { font-size: 40px; font-weight: 700; color: var(--text-primary); line-height: 1; letter-spacing: -.02em; }
  .risk { font-size: 13px; color: var(--allow); margin-top: 2px; }
</style>
</head>
<body>
  <div class="panel norviq-panel panel-demo">
    <div class="title">Security Score</div>
    <div class="gauge" id="g"></div>
    <div class="readout"><div class="num">87</div><div class="risk">Low Risk</div></div>
  </div>
  <script>
    const chart = echarts.init(document.getElementById('g'));
    chart.setOption({
      series: [{
        type: 'gauge', startAngle: 180, endAngle: 0, min: 0, max: 100, radius: '150%',
        center: ['50%', '92%'], pointer: { show: false },
        progress: { show: true, width: 22, roundCap: true, itemStyle: { color: {
          type: 'linear', x: 0, y: 0, x2: 1, y2: 0,
          colorStops: [{offset:0,color:'#00E5A0'},{offset:0.5,color:'#FFB020'},{offset:1,color:'#FF3B5C'}]
        }}},
        axisLine: { lineStyle: { width: 22, color: [[1, '#1A2744']] } },
        axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
        detail: { show: false }, data: [{ value: 87 }]
      }]
    });
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
