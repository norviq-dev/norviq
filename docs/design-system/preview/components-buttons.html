<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .btn { height: 32px; padding: 0 14px; border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: var(--transition); }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: var(--bg-surface-hover); color: var(--text-primary); }
  .outline { background: var(--bg-elevated); border-color: var(--border-active); color: var(--text-primary); }
  .ghost { background: transparent; color: var(--text-secondary); }
  .destructive { background: #ff3b5c20; color: #ff3b5c; }
  .save { background: var(--allow); color: #04130d; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 84px; }
</style>
</head>
<body>
  <div class="row"><span class="tag">primary</span><button class="btn primary">Apply</button><button class="btn secondary">Dry-Run</button><button class="btn outline">Restore</button></div>
  <div class="row"><span class="tag">subtle</span><button class="btn ghost">Cancel</button><button class="btn destructive">Freeze Agent</button><button class="btn save">Save Settings</button></div>
</body>
</html>
