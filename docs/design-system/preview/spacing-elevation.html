<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: center; font-family: var(--font-sans); }
  .box { height: 80px; border-radius: var(--radius-lg); background: var(--bg-surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .cap { text-align: center; margin-top: 10px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div>
    <div class="box" style="box-shadow:0 1px 3px rgba(0,0,0,.3)"><span style="color:var(--text-secondary);font-size:12px">card</span></div>
    <div class="cap"><div class="name">Card shadow</div><div class="val">0 1px 3px rgba(0,0,0,.3)</div></div>
  </div>
  <div>
    <div class="box" style="box-shadow:0 0 20px #3b7bf730;border-color:var(--border-active)"><span style="color:var(--accent);font-size:12px">glow</span></div>
    <div class="cap"><div class="name">Accent glow</div><div class="val">0 0 20px accent-glow</div></div>
  </div>
  <div>
    <div class="box" style="box-shadow:0 0 20px #00e5a020;border-color:#00e5a030"><span style="color:var(--allow);font-size:12px">KPI</span></div>
    <div class="cap"><div class="name">Metric glow</div><div class="val">0 0 20px &lt;color&gt;20</div></div>
  </div>
</body>
</html>
