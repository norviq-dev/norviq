<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-surface); padding: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: .04em; }
  .big { font-family: var(--font-sans); font-size: 40px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  pre { margin: 0; font-family: var(--font-mono); font-size: 11px; line-height: 1.7; color: var(--text-primary); }
  .k { color: var(--accent); }
  .s { color: var(--allow); }
</style>
</head>
<body>
  <div class="card">
    <div class="lbl">OUTFIT · GEOMETRIC SANS · 400–800</div>
    <div class="big">Norviq Aa</div>
    <div style="font-family:var(--font-sans);color:var(--text-secondary);font-size:13px;margin-top:8px">The quick brown fox jumps 1234567890</div>
  </div>
  <div class="card">
    <div class="lbl">JETBRAINS MONO · CODE · 400–500</div>
    <pre><span class="k">decision</span> = <span class="s">"allow"</span> {
  input.tool == <span class="s">"read_file"</span>
  trust &gt;= <span class="s">0.7</span>
}</pre>
  </div>
</body>
</html>
