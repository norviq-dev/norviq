<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 22px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 64px; display: flex; align-items: flex-end; padding: 8px 10px; }
  .meta { padding: 8px 10px; background: var(--bg-surface); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#e8edf5"><span style="color:#060b18;font-weight:600;font-size:13px">Primary text</span></div><div class="meta"><div class="name">Text Primary</div><div class="hex">#e8edf5</div></div></div>
    <div class="sw"><div class="chip" style="background:#8494b2"><span style="color:#060b18;font-weight:600;font-size:13px">Secondary text</span></div><div class="meta"><div class="name">Text Secondary</div><div class="hex">#8494b2</div></div></div>
    <div class="sw"><div class="chip" style="background:#4a5a78"><span style="color:#e8edf5;font-size:13px">Muted text</span></div><div class="meta"><div class="name">Text Muted</div><div class="hex">#4a5a78</div></div></div>
    <div class="sw"><div class="chip" style="background:#0c1425;border-bottom:1px solid #1a2744"></div><div class="meta"><div class="name">Border</div><div class="hex">#1a2744</div></div></div>
    <div class="sw"><div class="chip" style="background:#0c1425;border-bottom:1px solid #2a3f6a"></div><div class="meta"><div class="name">Border Active</div><div class="hex">#2a3f6a</div></div></div>
    <div class="sw"><div class="chip" style="background:#3b7bf7;box-shadow:inset 0 0 20px #3b7bf7"></div><div class="meta"><div class="name">Accent</div><div class="hex">#3b7bf7</div></div></div>
  </div>
</body>
</html>
